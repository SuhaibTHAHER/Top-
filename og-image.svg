<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#96cb3f;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#08a6cb;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.18)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.05)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Decorative circles -->
  <circle cx="-60" cy="-60" r="260" fill="rgba(255,255,255,0.07)"/>
  <circle cx="1260" cy="690" r="320" fill="rgba(255,255,255,0.07)"/>
  <circle cx="1100" cy="80"  r="160" fill="rgba(255,255,255,0.05)"/>
  <circle cx="80"   cy="560" r="120" fill="rgba(255,255,255,0.05)"/>

  <!-- Center card -->
  <rect x="140" y="120" width="920" height="390" rx="28" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>

  <!-- Cart icon (centered) -->
  <g transform="translate(600,220)">
    <circle cx="0" cy="0" r="72" fill="rgba(255,255,255,0.2)"/>
    <!-- Cart SVG icon scaled -->
    <g transform="translate(-22,-18) scale(1.8)" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="9"  cy="21" r="1" fill="white" stroke="none"/>
      <circle cx="20" cy="21" r="1" fill="white" stroke="none"/>
      <path d="M1 1h4l2.68 13.39a2 2 0 001.99 1.61h9.72a2 2 0 001.99-1.61L23 6H6"/>
    </g>
  </g>

  <!-- Arabic store name -->
  <text x="600" y="348"
    font-family="Arial, 'Helvetica Neue', sans-serif"
    font-size="68" font-weight="900"
    fill="white" text-anchor="middle"
    letter-spacing="1">Top Quality</text>

  <!-- Subtitle -->
  <text x="600" y="408"
    font-family="Arial, sans-serif"
    font-size="32" font-weight="600"
    fill="rgba(255,255,255,0.88)" text-anchor="middle"
    letter-spacing="2">SUPER MARKET</text>

  <!-- Tagline dots -->
  <circle cx="420" cy="445" r="5" fill="rgba(255,255,255,0.6)"/>
  <circle cx="600" cy="445" r="5" fill="rgba(255,255,255,0.6)"/>
  <circle cx="780" cy="445" r="5" fill="rgba(255,255,255,0.6)"/>

  <!-- Tag line -->
  <text x="600" y="488"
    font-family="Arial, sans-serif"
    font-size="22" font-weight="500"
    fill="rgba(255,255,255,0.78)" text-anchor="middle"
    letter-spacing="1">Fresh Products · Best Prices · Fast Delivery</text>

  <!-- Bottom URL bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.18)"/>
  <text x="600" y="615"
    font-family="Arial, sans-serif"
    font-size="17" font-weight="500"
    fill="rgba(255,255,255,0.7)" text-anchor="middle"
    letter-spacing="1">top-eight-jade.vercel.app</text>
</svg>
