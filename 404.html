<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>الصفحة غير موجودة — توب كواليتي</title>
  <meta name="robots" content="noindex"/>
  <link rel="icon" type="image/png" href="logo.png?v=3"/>
  <link rel="apple-touch-icon" href="logo.png?v=3"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Almarai:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Almarai', sans-serif;
      background: #f7faef;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      direction: rtl;
      overflow: hidden;
    }

    /* Decorative background circles */
    body::before {
      content: '';
      position: fixed;
      top: -100px; right: -100px;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: rgba(8, 166, 203, 0.07);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -80px; left: -80px;
      width: 320px; height: 320px;
      border-radius: 50%;
      background: rgba(150, 203, 63, 0.1);
      pointer-events: none;
    }

    .card {
      background: #fff;
      border-radius: 28px;
      padding: 52px 36px 44px;
      max-width: 500px;
      width: 100%;
      text-align: center;
      box-shadow: 0 16px 60px rgba(8, 166, 203, 0.13);
      position: relative;
      z-index: 1;
      animation: cardUp 0.5s cubic-bezier(.22,.68,0,1.2) both;
    }

    @keyframes cardUp {
      from { opacity:0; transform: translateY(30px) scale(0.96); }
      to   { opacity:1; transform: translateY(0)    scale(1);    }
    }

    /* Cart illustration */
    .cart-wrap {
      position: relative;
      width: 140px;
      height: 120px;
      margin: 0 auto 24px;
    }

    .cart-svg {
      animation: cartFloat 3s ease-in-out infinite;
    }

    @keyframes cartFloat {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    /* Shadow under cart */
    .cart-shadow {
      width: 80px;
      height: 10px;
      background: rgba(8,166,203,0.15);
      border-radius: 50%;
      margin: 0 auto;
      animation: shadowPulse 3s ease-in-out infinite;
    }

    @keyframes shadowPulse {
      0%, 100% { transform: scaleX(1);   opacity: 0.5; }
      50%       { transform: scaleX(0.7); opacity: 0.2; }
    }

    /* Spilled items (dots) around cart */
    .item {
      position: absolute;
      border-radius: 50%;
      animation: itemBounce 2.5s ease-in-out infinite;
    }

    @keyframes itemBounce {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50%       { transform: translateY(-6px) rotate(15deg); }
    }

    .code-404 {
      font-family: 'Cairo', sans-serif;
      font-size: 88px;
      font-weight: 900;
      color: #08a6cb;
      line-height: 1;
      margin-bottom: 8px;
      letter-spacing: -4px;
    }

    .code-404 span {
      color: #96cb3f;
    }

    h1 {
      font-family: 'Cairo', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 10px;
    }

    .sub {
      font-size: 14px;
      color: #64748b;
      line-height: 1.8;
      margin-bottom: 32px;
    }

    .btn-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 28px;
      border-radius: 12px;
      font-family: 'Cairo', sans-serif;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: all 0.22s;
    }

    .btn-primary {
      background: #08a6cb;
      color: #fff;
      box-shadow: 0 6px 20px rgba(8,166,203,0.35);
    }

    .btn-primary:hover {
      background: #158fa6;
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(8,166,203,0.45);
    }

    .btn-secondary {
      background: #f1f8e9;
      color: #4a7c20;
      border: 1.5px solid #c6e48b;
    }

    .btn-secondary:hover {
      background: #e6f4d7;
      transform: translateY(-2px);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      color: #b0bec5;
      font-size: 13px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e8f0fe;
    }

    .cat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .cat-item {
      background: #f7faef;
      border-radius: 12px;
      padding: 12px 6px;
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      color: #546e7a;
      text-decoration: none;
      border: 1.5px solid transparent;
      transition: all 0.2s;
    }

    .cat-item:hover {
      border-color: #08a6cb;
      background: #e0f7fb;
      color: #08a6cb;
    }

    .cat-item .emoji {
      display: block;
      font-size: 22px;
      margin-bottom: 5px;
    }

    .logo {
      width: 110px;
      height: auto;
      margin: 28px auto 0;
      display: block;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="card">

    <!-- Floating cart illustration -->
    <div class="cart-wrap">
      <!-- Spilled items -->
      <div class="item" style="width:14px;height:14px;background:#96cb3f;top:60px;left:8px;animation-delay:0.2s;"></div>
      <div class="item" style="width:10px;height:10px;background:#08a6cb;top:75px;left:28px;animation-delay:0.5s;border-radius:3px;"></div>
      <div class="item" style="width:12px;height:12px;background:#f97316;top:65px;right:10px;animation-delay:0.8s;"></div>
      <div class="item" style="width:8px;height:8px;background:#96cb3f;top:80px;right:30px;animation-delay:0.3s;"></div>

      <!-- Cart SVG -->
      <svg class="cart-svg" width="140" height="90" viewBox="0 0 140 90" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Cart body -->
        <path d="M20 15 L35 15 L52 62 A4 4 0 0 0 56 65 L118 65 A4 4 0 0 0 122 62 L135 28 L40 28" stroke="#08a6cb" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <!-- Cart bottom bar -->
        <line x1="52" y1="65" x2="122" y2="65" stroke="#08a6cb" stroke-width="4" stroke-linecap="round"/>
        <!-- Wheels -->
        <circle cx="65" cy="80" r="8" fill="#96cb3f"/>
        <circle cx="65" cy="80" r="4" fill="#fff"/>
        <circle cx="110" cy="80" r="8" fill="#96cb3f"/>
        <circle cx="110" cy="80" r="4" fill="#fff"/>
        <!-- Quality badge -->
        <circle cx="108" cy="36" r="14" fill="#08a6cb" stroke="#fff" stroke-width="2"/>
        <path d="M102 36 L106 40 L114 32" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- Speed lines -->
        <line x1="8"  y1="30" x2="32" y2="30" stroke="#96cb3f" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
        <line x1="2"  y1="42" x2="26" y2="42" stroke="#96cb3f" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
        <line x1="8"  y1="54" x2="28" y2="54" stroke="#96cb3f" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
      </svg>

      <div class="cart-shadow"></div>
    </div>

    <!-- 404 number -->
    <div class="code-404">4<span>0</span>4</div>

    <h1>عذراً! الصفحة غير موجودة</h1>
    <p class="sub">
      ربما تم نقل هذه الصفحة أو حذفها.<br/>
      لكن متجرنا مليء بأفضل المنتجات تنتظرك! 🛒
    </p>

    <div class="btn-row">
      <a href="/" class="btn btn-primary">🏠 العودة للرئيسية</a>
      <a href="/" class="btn btn-secondary">🏷️ تصفح العروض</a>
    </div>

    <div class="divider">أو اختر قسماً مباشرة</div>

    <div class="cat-grid">
      <a href="/" class="cat-item"><span class="emoji">🥦</span>خضار</a>
      <a href="/" class="cat-item"><span class="emoji">🥛</span>ألبان</a>
      <a href="/" class="cat-item"><span class="emoji">🥩</span>لحوم</a>
      <a href="/" class="cat-item"><span class="emoji">🥤</span>مشروبات</a>
      <a href="/" class="cat-item"><span class="emoji">🍞</span>مخبوزات</a>
      <a href="/" class="cat-item"><span class="emoji">🍫</span>مسليات</a>
      <a href="/" class="cat-item"><span class="emoji">🌾</span>حبوب</a>
      <a href="/" class="cat-item"><span class="emoji">⭐</span>مميز</a>
    </div>

    <img src="logo.png?v=3" alt="Top Quality" class="logo"/>
  </div>
</body>
</html>
