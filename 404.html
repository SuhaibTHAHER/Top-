<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>الصفحة غير موجودة — توب كواليتي</title>
  <meta name="robots" content="noindex"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Almarai:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Almarai', sans-serif;
      background: linear-gradient(160deg, #96cb3f 0%, #08a6cb 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      direction: rtl;
    }

    .card {
      background: #fff;
      border-radius: 28px;
      padding: 52px 36px 42px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 32px 80px rgba(0,0,0,0.18);
      animation: cardUp 0.5s cubic-bezier(.22,.68,0,1.2) both;
    }

    @keyframes cardUp {
      from { opacity:0; transform: translateY(30px) scale(0.96); }
      to   { opacity:1; transform: translateY(0)    scale(1);    }
    }

    .cart-icon-wrap {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: linear-gradient(135deg, #96cb3f, #08a6cb);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0);   }
      50%       { transform: translateY(-8px); }
    }

    .code-404 {
      font-size: 90px;
      font-weight: 900;
      background: linear-gradient(135deg, #96cb3f, #08a6cb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 12px;
      letter-spacing: -3px;
    }

    h1, h2, h3 { font-family: 'Cairo', sans-serif; }
    h1 {
      font-size: 22px;
      font-weight: 800;
      color: #2d3436;
      margin-bottom: 12px;
    }

    p {
      font-size: 15px;
      color: #78909c;
      line-height: 1.8;
      margin-bottom: 32px;
    }

    .btn-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 36px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 26px;
      border-radius: 14px;
      font-family: 'Tajawal', sans-serif;
      font-size: 15px;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: all 0.22s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #96cb3f, #6ea82d);
      color: #fff;
      box-shadow: 0 6px 20px rgba(140,198,63,0.4);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(140,198,63,0.5);
    }

    .btn-secondary {
      background: #f4f6f8;
      color: #546e7a;
      border: 1.5px solid #e0e6ed;
    }

    .btn-secondary:hover {
      background: #e8ecf0;
      transform: translateY(-2px);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      color: #b0bec5;
      font-size: 13px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e8ecf0;
    }

    .suggestion-title {
      font-size: 14px;
      font-weight: 700;
      color: #546e7a;
      margin-bottom: 14px;
    }

    .cat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .cat-item {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 12px 6px;
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      color: #546e7a;
      text-decoration: none;
      border: 1.5px solid transparent;
      transition: all 0.2s;
    }

    .cat-item:hover {
      border-color: #96cb3f;
      background: #f1f8e9;
      color: #5a9223;
    }

    .cat-item .emoji {
      display: block;
      font-size: 22px;
      margin-bottom: 5px;
    }

    .footer-note {
      font-size: 12px;
      color: #cfd8dc;
      margin-top: 28px;
    }
  </style>
</head>
<body>
  <div class="card">

    <!-- Cart icon -->
    <div class="cart-icon-wrap">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none"
        stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9"  cy="21" r="1" fill="white" stroke="none"/>
        <circle cx="20" cy="21" r="1" fill="white" stroke="none"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 001.99 1.61h9.72a2 2 0 001.99-1.61L23 6H6"/>
      </svg>
    </div>

    <!-- 404 code -->
    <div class="code-404">404</div>

    <!-- Title and message -->
    <h1>عذراً! هذه الصفحة غير موجودة</h1>
    <p>
      ربما تم نقل الصفحة أو حذف الرابط.<br/>
      لكن متجرنا مليء بأفضل المنتجات التي تنتظرك! 🛒
    </p>

    <!-- Buttons -->
    <div class="btn-row">
      <a href="/" class="btn btn-primary">
        🏠 العودة للرئيسية
      </a>
      <a href="/" onclick="setTimeout(()=>document.querySelector('[placeholder]')&&document.querySelector('[placeholder]').focus(),300)" class="btn btn-secondary">
        🔍 بحث المنتجات
      </a>
    </div>

    <div class="divider">أو تصفح أقسامنا مباشرة</div>

    <!-- Category quick links -->
    <div class="cat-grid">
      <a href="/" class="cat-item">
        <span class="emoji">🥦</span>خضار وفواكه
      </a>
      <a href="/" class="cat-item">
        <span class="emoji">🥛</span>ألبان
      </a>
      <a href="/" class="cat-item">
        <span class="emoji">🥩</span>لحوم
      </a>
      <a href="/" class="cat-item">
        <span class="emoji">🥤</span>مشروبات
      </a>
      <a href="/" class="cat-item">
        <span class="emoji">🍞</span>مخبوزات
      </a>
      <a href="/" class="cat-item">
        <span class="emoji">🍫</span>مسليات
      </a>
      <a href="/" class="cat-item">
        <span class="emoji">🌾</span>حبوب
      </a>
      <a href="/" class="cat-item">
        <span class="emoji">🏷️</span>العروض
      </a>
    </div>

    <p class="footer-note">توب كواليتي سوبر ماركت · جودة عالية بأسعار منافسة</p>
  </div>
</body>
</html>
