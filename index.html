                    <div style={{ fontSize:11, color:'var(--text3)', marginTop:2 }}>{new Date(order.date).toLocaleDateString('ar-EG')}</div>
                  </div>
                  <span style={{ background:(statusColor[order.status]||'#aaa')+'22', color:statusColor[order.status]||'#aaa', borderRadius:20, padding:'3px 10px', fontSize:12, fontWeight:700 }}>{statusLabel[order.status]||order.status}</span>
                </div>
                <div style={{ fontSize:12, color:'var(--text2)', marginBottom:10, lineHeight:1.8 }}>
                  {order.items.map(i=><span key={i.id} style={{ display:'inline-block', background:'var(--surface)', border:'1px solid var(--border)', borderRadius:6, padding:'2px 8px', marginLeft:4, marginBottom:4 }}>{i.name} ×{i.qty}</span>)}
                </div>
                {order.status !== 'cancelled' && (
                  <div style={{ display:'flex', alignItems:'center', marginBottom:12, marginTop:2 }}>
                    {ORDER_STEPS.map((s,i)=>(
                      <React.Fragment key={i}>
                        <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:3 }}>
                          <div style={{ width:20, height:20, borderRadius:'50%', background:i<=(STEP_INDEX[order.status]??0)?GREEN:'#e0e0e0', display:'flex', alignItems:'center', justifyContent:'center', transition:'background 0.3s' }}>
                            {i<(STEP_INDEX[order.status]??0) ? <CheckIcon size={11} color="#fff"/> : <span style={{ width:6, height:6, borderRadius:'50%', background:i===(STEP_INDEX[order.status]??0)?'#fff':'#bbb', display:'inline-block' }}/>}
                          </div>
                          <span style={{ fontSize:9, color:i<=(STEP_INDEX[order.status]??0)?GREEN:'#bbb', fontWeight:i===(STEP_INDEX[order.status]??0)?700:400, whiteSpace:'nowrap' }}>{s}</span>
                        </div>
                        {i<ORDER_STEPS.length-1 && <div style={{ flex:1, height:2, background:i<(STEP_INDEX[order.status]??0)?GREEN:'#e0e0e0', margin:'0 3px 14px', transition:'background 0.3s' }}/>}
                      </React.Fragment>
                    ))}
                  </div>
                )}
                {cancelConfirmId === order.id && (
                  <div style={{ background:'#fff3cd', border:'1px solid #ffc107', borderRadius:10, padding:'10px 14px', marginBottom:10, display:'flex', alignItems:'center', justifyContent:'space-between', gap:8 }}>
                    <span style={{ fontSize:13, fontWeight:700, color:'#856404' }}>تأكيد إلغاء الطلب؟</span>
                    <div style={{ display:'flex', gap:6 }}>
                      <button onClick={()=>setCancelConfirmId(null)} style={{ background:'var(--surface2)', border:'1px solid var(--border)', borderRadius:8, padding:'5px 12px', cursor:'pointer', fontFamily:'Tajawal,sans-serif', fontSize:12, fontWeight:700, color:'var(--text2)' }}>لا</button>
                      <button onClick={()=>{ onCancel(order.id); setCancelConfirmId(null); }} style={{ background:'#e74c3c', color:'#fff', border:'none', borderRadius:8, padding:'5px 14px', cursor:'pointer', fontFamily:'Tajawal,sans-serif', fontSize:12, fontWeight:700 }}>نعم، إلغاء</button>
                    </div>
                  </div>
                )}
                <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
                  <div>
                    <span style={{ fontWeight:800, fontSize:15, color:GREEN }}>₪{Number(order.total).toFixed(2)}</span>
                    {order.payment && <span style={{ fontSize:11, color:'#aaa', marginRight:8 }}>{order.payment==='cash'?'💵':order.payment==='card'?'💳':'📱'} {order.payment==='cash'?'نقداً':order.payment==='card'?'بطاقة':'محفظة'}</span>}
                  </div>
                  <div style={{ display:'flex', gap:7, flexWrap:'wrap', justifyContent:'flex-end' }}>
                    {order.status === 'pending' && (
                      <button onClick={()=>setCancelConfirmId(cancelConfirmId===order.id?null:order.id)} style={{ background:'#fce4ec', color:'#e74c3c', border:'none', borderRadius:9, padding:'7px 11px', cursor:'pointer', fontFamily:'Tajawal,sans-serif', fontSize:12, fontWeight:700, display:'flex', alignItems:'center', gap:4 }}>
                        <XIcon size={12} color="#e74c3c"/> إلغاء
                      </button>
                    )}
                    <button onClick={()=>setReceiptOrder(order)} style={{ background:GREEN+'18', color:GREEN, border:'none', borderRadius:9, padding:'7px 12px', cursor:'pointer', fontFamily:'Tajawal,sans-serif', fontSize:12, fontWeight:700, display:'flex', alignItems:'center', gap:4 }}>
                      <PrinterIcon size={13} color={GREEN}/> فاتورة
                    </button>
                    <button onClick={()=>onReorder(order)} style={{ background:TEAL, color:'#fff', border:'none', borderRadius:9, padding:'7px 14px', cursor:'pointer', fontFamily:'Tajawal,sans-serif', fontSize:13, fontWeight:700, display:'flex', alignItems:'center', gap:5 }}>
                      <RefreshIcon size={14} color="#fff"/> أعد الطلب
                    </button>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
        {receiptOrder && <OrderReceiptModal order={receiptOrder} onClose={()=>setReceiptOrder(null)}/>}
      </div>
    );
  }

  /* ── ReviewForm ──────────────────────────────────────────────────────── */
  function ReviewForm({ onAdd }) {
    const [author, setAuthor] = useState('');
    const [text,   setText]   = useState('');
    const [stars,  setStars]  = useState(0);
    const [open,   setOpen]   = useState(false);
    const inp = { width:'100%', padding:'9px 12px', border:'2px solid var(--input-border)', borderRadius:10, fontFamily:'Tajawal,sans-serif', fontSize:13, outline:'none', transition:'border-color 0.2s', background:'var(--input-bg)', color:'var(--text)' };
    const canSubmit = text.trim() && stars > 0;
    if (!open) return (
      <button onClick={()=>setOpen(true)} style={{ display:'flex', alignItems:'center', gap:6, background:'var(--surface2)', border:'1.5px dashed var(--border)', borderRadius:10, padding:'9px 14px', cursor:'pointer', fontFamily:'Tajawal,sans-serif', fontSize:13, fontWeight:700, color:'var(--text2)', width:'100%', justifyContent:'center', marginTop:8 }}>
        ✏️ أضف مراجعتك
      </button>
    );
    return (
      <div style={{ background:'var(--surface2)', borderRadius:12, padding:'12px 14px', marginTop:8, border:'1.5px solid var(--border)' }}>
        <div style={{ marginBottom:10 }}>
          <div style={{ fontSize:12, fontWeight:700, color:'var(--text2)', marginBottom:5 }}>تقييمك *</div>
          <StarRatingInline stars={stars} onRate={setStars}/>
        </div>
        <input value={author} onChange={e=>setAuthor(e.target.value)} placeholder="اسمك (اختياري)"
          style={{...inp, marginBottom:8}}
          onFocus={e=>e.target.style.borderColor=GREEN} onBlur={e=>e.target.style.borderColor='var(--input-border)'}/>
        <textarea value={text} onChange={e=>setText(e.target.value)} placeholder="شاركنا رأيك في هذا المنتج..." rows={3}
          style={{...inp, resize:'none', marginBottom:10}}
          onFocus={e=>e.target.style.borderColor=GREEN} onBlur={e=>e.target.style.borderColor='var(--input-border)'}/>
        <div style={{ display:'flex', gap:8 }}>
          <button onClick={()=>{ setOpen(false); setAuthor(''); setText(''); setStars(0); }} style={{ flex:1, padding:'8px', background:'var(--surface)', border:'1px solid var(--border)', borderRadius:9, cursor:'pointer', fontFamily:'Tajawal,sans-serif', fontSize:13, fontWeight:700, color:'var(--text2)' }}>إلغاء</button>
          <button onClick={()=>{
            if (!canSubmit) return;
            onAdd({ author:author.trim()||'زائر', text:text.trim(), stars, date:new Date().toISOString() });
            setOpen(false); setAuthor(''); setText(''); setStars(0);
          }} disabled={!canSubmit}
          style={{ flex:2, padding:'8px', background:canSubmit?GREEN:'#ccc', border:'none', borderRadius:9, cursor:canSubmit?'pointer':'not-allowed', fontFamily:'Tajawal,sans-serif', fontSize:13, fontWeight:700, color:'#fff', display:'flex', alignItems:'center', justifyContent:'center', gap:5 }}>
            <CheckIcon size={14} color="#fff"/> نشر المراجعة
          </button>
        </div>
      </div>
    );
  }

  /* helper: inline star picker used in ReviewForm (avoids shared hover state) */
  function StarRatingInline({ stars, onRate }) {
    const [hov, setHov] = useState(0);
    return (
      <div style={{ display:'flex', gap:2 }}>
        {[1,2,3,4,5].map(i=>(
          <span key={i} onClick={()=>onRate(i)} onMouseEnter={()=>setHov(i)} onMouseLeave={()=>setHov(0)}
            style={{ cursor:'pointer', display:'inline-flex' }}>
            <StarIcon size={22} color="#f0c040" filled={i<=(hov||stars)}/>
          </span>
        ))}
        {stars>0 && <span style={{ fontSize:12, color:'#aaa', marginRight:6, alignSelf:'center' }}>{stars} نجمة</span>}
      </div>
    );
  }

  function StarRating({ avg=0, count=0, myRating=0, onRate, small=false }) {
    const [hovered, setHovered] = useState(null);
    const s = small ? 13 : 20;
    const active = hovered || myRating || 0;
    return (
      <div style={{ display:'flex', alignItems:'center', gap:small?1:3 }}>
        {[1,2,3,4,5].map(i=>(
          <span key={i} onClick={()=>onRate&&onRate(i)} onMouseEnter={()=>onRate&&setHovered(i)} onMouseLeave={()=>setHovered(null)}
            style={{ cursor:onRate?'pointer':'default', display:'inline-flex', transition:'transform 0.1s' }}
            onMouseDown={e=>onRate&&(e.currentTarget.style.transform='scale(0.85)')}
            onMouseUp={e=>e.currentTarget.style.transform=''}>
            <StarIcon size={s} color="#f0c040" filled={i<=(active||avg)}/>
          </span>
        ))}
        {!small && count>0 && <span style={{ fontSize:12, color:'#aaa', marginRight:4 }}>({count})</span>}
      </div>
    );
  }

  function ProductDetailModal({ product, products, cart, onClose, onAdd, onFav, isFav, inCart, onUpdate, onSelect, rating, myRating, onRate, reviews, onAddReview }) {
    const related = products.filter(p=>p.category===product.category&&p.id!==product.id).slice(0,4);
    const price = product.discount>0 ? product.price*(1-product.discount/100) : product.price;
    const [shared, setShared] = useState(false);
    const handleShare = async () => {
      const text = `${product.name} · ${fmt(price)} فقط في Top Quality Super Market`;
      if (navigator.share) {
        try { await navigator.share({ title: product.name, text, url: window.location.href }); } catch {}
      } else if (navigator.clipboard) {
        try { await navigator.clipboard.writeText(text); setShared(true); setTimeout(()=>setShared(false), 2000); } catch {}
      }
    };
    const cat   = window.CATEGORIES && window.CATEGORIES.find(c=>c.id===product.category);
    const bg = CAT_BG[product.category]||'#f5f5f5';
    const ic = CAT_IC[product.category]||'#bbb';
    const CatIco = window.CAT_ICONS && window.CAT_ICONS[product.category];
    return (
      <div style={{ position:'fixed', inset:0, zIndex:2000, background:'rgba(0,0,0,0.65)', backdropFilter:'blur(6px)', display:'flex', alignItems:'center', justifyContent:'center', padding:16 }}
        onClick={e=>e.target===e.currentTarget&&onClose()}>
        <div style={{ background:'var(--surface)', borderRadius:24, width:480, maxWidth:'100%', maxHeight:'90vh', overflowY:'auto', boxShadow:'0 24px 64px rgba(0,0,0,0.28)', animation:'aiSlideUp 0.28s ease' }}>
          <div style={{ position:'relative' }}>
            <div style={{ height:200, overflow:'hidden', borderRadius:'24px 24px 0 0', background:bg, display:'flex', alignItems:'center', justifyContent:'center' }}>
              {product.image ? <img src={product.image} alt={product.name} style={{ width:'100%', height:'100%', objectFit:'cover' }}/> : CatIco ? <CatIco size={80} color={ic}/> : null}
            </div>
            <button onClick={onClose} style={{ position:'absolute', top:12, left:12, background:'rgba(255,255,255,0.92)', border:'none', borderRadius:'50%', width:36, height:36, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>
              <XIcon size={17} color="#555"/>
            </button>
            {product.discount>0 && <div style={{ position:'absolute', top:12, right:12, background:'#e74c3c', color:'#fff', borderRadius:20, padding:'4px 12px', fontSize:13, fontWeight:800 }}>-{product.discount}%</div>}
          </div>
          <div style={{ padding:'20px 24px 28px' }}>
            <div style={{ display:'flex', alignItems:'start', justifyContent:'space-between', marginBottom:10 }}>
              <div style={{ flex:1 }}>
                <h2 style={{ fontSize:22, fontWeight:900, color:'var(--text)', marginBottom:6, lineHeight:1.3 }}>{product.name}</h2>
                {cat && <span style={{ fontSize:13, color:TEAL, background:TEAL+'14', borderRadius:20, padding:'3px 10px', fontWeight:700 }}>{cat.name}</span>}
              </div>
              <div style={{ display:'flex', gap:8, flexShrink:0 }}>
                <button onClick={handleShare} title="مشاركة المنتج" style={{ background:shared?'#e8f5e9':'var(--surface2)', border:'none', borderRadius:'50%', width:44, height:44, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', transition:'background 0.2s' }}>
                  {shared ? <CheckIcon size={18} color={GREEN}/> : <ShareIcon size={18} color="var(--text3)"/>}
                </button>
                <button onClick={()=>onFav(product.id)} style={{ background:isFav?'#fce4ec':'var(--surface2)', border:'none', borderRadius:'50%', width:44, height:44, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>
                  <HeartIcon size={20} color={isFav?'#e74c3c':'#bbb'} filled={isFav}/>
                </button>
              </div>
            </div>
            {product.desc && <p style={{ fontSize:14, color:'var(--text2)', lineHeight:1.7, marginBottom:16 }}>{product.desc}</p>}
            <div style={{ display:'flex', alignItems:'center', gap:20, marginBottom:18, padding:'14px 16px', background:'var(--surface2)', borderRadius:14 }}>
              <div>
                <div style={{ fontSize:28, fontWeight:900, color:GREEN }}>{fmt(price)}</div>
                {product.discount>0 && <div style={{ fontSize:13, color:'var(--text3)', textDecoration:'line-through' }}>{fmt(product.price)}</div>}
              </div>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:13, color:product.stock<15?'#e74c3c':'var(--text2)', fontWeight:700, marginBottom:6 }}>المخزون: {product.stock} وحدة</div>
                <div style={{ height:6, background:'var(--border)', borderRadius:3, overflow:'hidden' }}>
                  <div style={{ height:'100%', borderRadius:3, background:product.stock<15?'#e74c3c':GREEN, width:`${Math.min(product.stock/60*100,100)}%`, transition:'width 0.4s ease' }}/>
                </div>
              </div>
            </div>
            <div style={{ marginBottom:16, padding:'12px 14px', background:'var(--surface2)', borderRadius:12 }}>
              <div style={{ fontSize:13, fontWeight:700, color:'var(--text)', marginBottom:8 }}>
                {rating&&rating.count>0 ? `التقييم: ${rating.avg.toFixed(1)} ★ (${rating.count})` : 'قيّم هذا المنتج'}
              </div>
              <StarRating avg={rating?.avg||0} count={rating?.count||0} myRating={myRating||0} onRate={onRate}/>
              {myRating>0 && <div style={{ fontSize:11, color:GREEN, marginTop:6, fontWeight:700 }}>تقييمك: {myRating} نجمة</div>}
            </div>

            {/* ── Reviews section ── */}
            <div style={{ marginBottom:16 }}>
              <div style={{ fontSize:13, fontWeight:800, color:'var(--text)', marginBottom:10, display:'flex', alignItems:'center', gap:6 }}>
                <span style={{ fontSize:16 }}>💬</span>
                مراجعات العملاء
                {(reviews||[]).length>0 && <span style={{ background:GREEN+'18', color:GREEN, borderRadius:20, padding:'1px 9px', fontSize:11, fontWeight:700 }}>{(reviews||[]).length}</span>}
              </div>
              {(reviews||[]).length >= 2 && (()=>{
                const cnts=[5,4,3,2,1].map(s=>({ s, n:(reviews||[]).filter(r=>r.stars===s).length }));
                const maxN=Math.max(...cnts.map(c=>c.n),1);
                return (
                  <div style={{ background:'var(--surface2)', borderRadius:12, padding:'10px 14px', marginBottom:10, border:'1px solid var(--border)' }}>
                    <div style={{ fontSize:12, fontWeight:800, color:'var(--text)', marginBottom:8 }}>توزيع التقييمات</div>
                    {cnts.map(({s,n})=>(
                      <div key={s} style={{ display:'flex', alignItems:'center', gap:7, marginBottom:5 }}>
                        <span style={{ fontSize:11, color:'var(--text2)', minWidth:12, textAlign:'center' }}>{s}</span>
                        <StarIcon size={11} color="#f0c040" filled={true}/>
                        <div style={{ flex:1, height:8, background:'var(--border)', borderRadius:4, overflow:'hidden' }}>
                          <div style={{ height:'100%', width:`${(n/maxN)*100}%`, background:s>=4?GREEN:s===3?'#f39c12':'#e74c3c', borderRadius:4, transition:'width 0.6s ease' }}/>
                        </div>
                        <span style={{ fontSize:11, color:'var(--text2)', minWidth:14, textAlign:'center' }}>{n}</span>
                      </div>
                    ))}
                  </div>
                );
              })()}
              {(reviews||[]).length>0 && (
                <div style={{ display:'flex', flexDirection:'column', gap:8, marginBottom:8, maxHeight:220, overflowY:'auto', paddingLeft:2 }}>
                  {[...(reviews||[])].reverse().map(r=>(
                    <div key={r.id} style={{ background:'var(--surface2)', borderRadius:12, padding:'10px 14px', border:'1px solid var(--border)' }}>
                      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:5 }}>
                        <span style={{ fontWeight:800, fontSize:13, color:'var(--text)' }}>{r.author}</span>
                        <div style={{ display:'flex', alignItems:'center', gap:4 }}>
                          {[1,2,3,4,5].map(i=><StarIcon key={i} size={12} color="#f0c040" filled={i<=r.stars}/>)}
                        </div>
                      </div>
                      <p style={{ fontSize:13, color:'var(--text2)', margin:0, lineHeight:1.65 }}>{r.text}</p>
                      <span style={{ fontSize:11, color:'#bbb', marginTop:4, display:'block' }}>{new Date(r.date).toLocaleDateString('ar-EG')}</span>
                    </div>
                  ))}
                </div>
              )}
              {onAddReview && <ReviewForm onAdd={onAddReview}/>}
            </div>

            {inCart>0 ? (
              <div style={{ display:'flex', alignItems:'center', gap:14, background:'#e8f5e9', borderRadius:14, padding:'12px 16px', marginBottom:16 }}>
                <button onClick={()=>onUpdate(product.id,inCart-1)} style={{ width:36, height:36, borderRadius:'50%', border:`2px solid ${GREEN}`, background:'var(--surface)', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}><MinusIcon size={16} color={GREEN}/></button>
                <span style={{ flex:1, textAlign:'center', fontWeight:900, fontSize:17 }}>{inCart} في السلة</span>
                <button onClick={()=>onUpdate(product.id,inCart+1)} style={{ width:36, height:36, borderRadius:'50%', background:GREEN, border:'none', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}><PlusIcon size={16} color="#fff"/></button>
              </div>
            ) : (
              <button onClick={()=>onAdd(product)} style={{ width:'100%', padding:'13px', background:GREEN, color:'#fff', border:'none', borderRadius:14, fontFamily:'Tajawal,sans-serif', fontSize:15, fontWeight:800, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:8, marginBottom:16, transition:'opacity 0.2s' }}>
                <CartIcon size={18} color="#fff"/> أضف إلى السلة
              </button>
            )}
            {related.length>0 && (
              <div>
                <h3 style={{ fontSize:14, fontWeight:800, color:'var(--text)', marginBottom:12 }}>منتجات مشابهة</h3>
                <div style={{ display:'flex', gap:10, overflowX:'auto', paddingBottom:4 }}>
                  {related.map(p=>{
                    const rp = p.discount>0?p.price*(1-p.discount/100):p.price;
                    const rbg = CAT_BG[p.category]||'#f5f5f5';
                    const ric = CAT_IC[p.category]||'#bbb';
                    const RIco = window.CAT_ICONS && window.CAT_ICONS[p.category];
                    return (
                      <div key={p.id} onClick={()=>onSelect(p)} style={{ flexShrink:0, width:96, cursor:'pointer', borderRadius:12, overflow:'hidden', border:'1.5px solid var(--border)', transition:'transform 0.15s' }}
                        onMouseEnter={e=>e.currentTarget.style.transform='translateY(-3px)'}
                        onMouseLeave={e=>e.currentTarget.style.transform=''}>
                        <div style={{ height:70, background:rbg, display:'flex', alignItems:'center', justifyContent:'center', overflow:'hidden' }}>
                          {p.image?<img src={p.image} style={{ width:'100%', height:'100%', objectFit:'cover' }}/>:RIco?<RIco size={30} color={ric}/>:null}
                        </div>
                        <div style={{ padding:'6px 8px', background:'var(--surface)' }}>
                          <div style={{ fontSize:11, fontWeight:700, color:'var(--text)', lineHeight:1.3, marginBottom:2 }}>{p.name}</div>
                          <div style={{ fontSize:11, color:GREEN, fontWeight:800 }}>{fmt(rp)}</div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        </div>
      </div>
    );
  }

  function ProductThumb({ product, height=130, iconSize=56 }) {
    const bg = CAT_BG[product.category]||'#f5f5f5';
    const ic = CAT_IC[product.category]||'#bbb';
    const CatIco = window.CAT_ICONS && window.CAT_ICONS[product.category];
    if (product.image) return (
      <div style={{ height, overflow:'hidden', background:bg }}>
        <img src={product.image} alt={product.name} style={{ width:'100%', height:'100%', objectFit:'cover', display:'block' }}/>
      </div>
    );
    return (
      <div style={{ height, background:bg, display:'flex', alignItems:'center', justifyContent:'center' }}>
        {CatIco && <CatIco size={iconSize} color={ic}/>}
      </div>
    );
  }

  function ProductCard({ product, onAdd, onFav, isFav, inCart, onCompare, inCompare, onSelect, animDelay=0, rating, isWatched, onWatch, listMode=false }) {
    const [added,    setAdded]    = useState(false);
    const [copied,   setCopied]   = useState(false);
    const finalPrice  = product.discount>0 ? product.price*(1-product.discount/100) : product.price;
    const outOfStock  = product.stock === 0;
    const handleAdd   = (e) => { e.stopPropagation(); if (outOfStock) return; onAdd(product); setAdded(true); setTimeout(()=>setAdded(false),1300); };
    const lowStock    = product.stock > 0 && product.stock < 10;
    const isNew       = product.id > 31;
    const handleCardShare = async (e) => {
      e.stopPropagation();
      const text = `${product.name} · ${fmt(finalPrice)} فقط في Top Quality Super Market`;
      if (navigator.share) { try { await navigator.share({ title:product.name, text, url:window.location.href }); } catch {} }
      else if (navigator.clipboard) { try { await navigator.clipboard.writeText(text); setCopied(true); setTimeout(()=>setCopied(false),1800); } catch {} }
    };

    if (listMode) {
      return (
        <div onClick={()=>onSelect&&onSelect(product)} style={{ display:'flex', alignItems:'center', background:'var(--surface)', borderRadius:14, overflow:'hidden', boxShadow:'var(--card-shadow)', gap:0, cursor:onSelect?'pointer':'default', animation:`cardIn 0.4s ease ${animDelay}s backwards`, transition:'box-shadow 0.2s' }}
          onMouseEnter={e=>e.currentTarget.style.boxShadow='0 6px 22px rgba(0,0,0,0.12)'} onMouseLeave={e=>e.currentTarget.style.boxShadow='0 2px 10px rgba(0,0,0,0.06)'}>
          <div style={{ width:80, flexShrink:0, position:'relative' }}>
            <ProductThumb product={product} height={80} iconSize={38}/>
            {outOfStock && <div style={{ position:'absolute', inset:0, background:'rgba(255,255,255,0.5)' }}/>}
          </div>
          <div style={{ flex:1, padding:'10px 12px', minWidth:0 }}>
            <div style={{ fontWeight:700, fontSize:14, color:outOfStock?'#aaa':'var(--text)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{product.name}</div>
            <div style={{ fontSize:12, color:'#bbb', marginTop:2 }}>{product.desc}</div>
            {!outOfStock && rating&&rating.count>0 && <StarRating avg={rating.avg} count={rating.count} small/>}
            {outOfStock && <span style={{ fontSize:11, color:'#999', fontWeight:700 }}>نفذت الكمية</span>}
            {!outOfStock && lowStock && <span style={{ fontSize:11, color:'#e74c3c', fontWeight:700 }}>آخر {product.stock} وحدات!</span>}
            {!outOfStock && !lowStock && !product.label && isNew && <span style={{ fontSize:11, color:TEAL, fontWeight:700 }}>✦ جديد</span>}
            {!outOfStock && product.label && window.PRODUCT_LABELS && (() => { const lbl=window.PRODUCT_LABELS.find(l=>l.id===product.label); return lbl&&lbl.id ? <span style={{ fontSize:11, fontWeight:800, color:lbl.color }}>{lbl.emoji} {lbl.label}</span> : null; })()}
          </div>
          <div style={{ padding:'10px 12px', display:'flex', flexDirection:'column', alignItems:'flex-end', gap:6, flexShrink:0 }}>
            <span style={{ fontWeight:900, fontSize:16, color:outOfStock?'#bbb':GREEN }}>{fmt(finalPrice)}</span>
            {!outOfStock && product.discount>0 && <span style={{ fontSize:11, color:'#bbb', textDecoration:'line-through' }}>{fmt(product.price)}</span>}
            {outOfStock ? (
              <button disabled style={{ background:'var(--surface2)', color:'var(--text3)', border:'1px solid var(--border)', borderRadius:9, padding:'6px 12px', fontFamily:'Tajawal,sans-serif', fontSize:11, fontWeight:700, cursor:'not-allowed' }}>نفذ</button>
            ) : (
              <button onClick={handleAdd} style={{ background:added?'#27ae60':GREEN, color:'#fff', border:'none', borderRadius:9, padding:'6px 14px', fontFamily:'Tajawal,sans-serif', fontSize:12, fontWeight:700, cursor:'pointer', display:'flex', alignItems:'center', gap:4, transition:'background 0.2s' }}>
                {added ? <><CheckIcon size={12} color="#fff"/> أُضيف</> : inCart>0 ? `(${inCart})+` : <><PlusIcon size={12} color="#fff"/> أضف</>}
              </button>
            )}
          </div>
        </div>
      );
    }

    return (
      <div onClick={()=>onSelect&&onSelect(product)}
        style={{ background:'var(--surface)', borderRadius:18, overflow:'hidden', boxShadow:inCompare?`0 0 0 2.5px ${TEAL},0 4px 20px rgba(31,159,179,0.18)`:'var(--card-shadow)', transition:'transform 0.22s,box-shadow 0.22s', position:'relative', display:'flex', flexDirection:'column', cursor:onSelect?'pointer':'default', animation:`cardIn 0.4s ease ${animDelay}s backwards` }}
        onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-6px) scale(1.02)';if(!inCompare)e.currentTarget.style.boxShadow='0 14px 32px rgba(0,0,0,0.14)';}}
        onMouseLeave={e=>{e.currentTarget.style.transform='';e.currentTarget.style.boxShadow=inCompare?`0 0 0 2.5px ${TEAL},0 4px 20px rgba(31,159,179,0.18)`:'0 2px 14px rgba(0,0,0,0.07)';}}>
        {outOfStock ? (
          <div style={{ position:'absolute', top:10, left:10, zIndex:2, background:'#757575', color:'#fff', borderRadius:20, padding:'3px 10px', fontSize:12, fontWeight:800 }}>نفذت الكمية</div>
        ) : product.discount>0 ? (
          <div style={{ position:'absolute', top:10, left:10, zIndex:2, background:'#e74c3c', color:'#fff', borderRadius:20, padding:'3px 10px', fontSize:12, fontWeight:800, display:'flex', alignItems:'center', gap:4 }}>
            <TagIcon size={11} color="#fff"/>-{product.discount}%
          </div>
        ) : lowStock ? (
          <div style={{ position:'absolute', top:10, left:10, zIndex:2, background:'#ff8f00', color:'#fff', borderRadius:20, padding:'3px 10px', fontSize:11, fontWeight:800 }}>
            آخر {product.stock}!
          </div>
        ) : null}
        {/* أيقونات المنتج — شبكة 2×2 لتوفير المساحة على الصورة */}
        <div style={{ position:'absolute', top:7, right:7, zIndex:2, display:'grid', gridTemplateColumns:'1fr 1fr', gap:4 }}>
          {[
            { key:'fav',     bg:isFav?'#fce4ec':'rgba(255,255,255,0.92)',     icon:<HeartIcon size={15} color={isFav?'#e74c3c':'#bbb'} filled={isFav}/>,      title:'مفضلة',          onClick:e=>{e.stopPropagation();onFav(product.id);} },
            { key:'cmp',     bg:inCompare?TEAL:'rgba(255,255,255,0.92)',       icon:<ScaleIcon size={14} color={inCompare?'#fff':'#bbb'}/>,                    title:'مقارنة',         onClick:e=>{e.stopPropagation();onCompare(product.id);} },
            { key:'watch',   bg:isWatched?'#fff8e1':'rgba(255,255,255,0.92)', icon:<BellIcon size={14} color={isWatched?'#f39c12':'#bbb'}/>,                  title:isWatched?'إلغاء تنبيه':'تنبيه السعر', onClick:e=>{e.stopPropagation();onWatch&&onWatch(product);}, hide:!onWatch },
            { key:'share',   bg:copied?'#e8f5e9':'rgba(255,255,255,0.92)',     icon:copied?<CheckIcon size={14} color={GREEN}/>:<ShareIcon size={13} color="#bbb"/>, title:'مشاركة',    onClick:handleCardShare },
          ].filter(b=>!b.hide).map(b=>(
            <button key={b.key} onClick={b.onClick} title={b.title}
              style={{ background:b.bg, border:'none', borderRadius:'50%', width:30, height:30, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', boxShadow:'0 1px 5px rgba(0,0,0,0.15)', transition:'transform 0.15s, background 0.15s' }}
              onMouseEnter={e=>e.currentTarget.style.transform='scale(1.18)'} onMouseLeave={e=>e.currentTarget.style.transform=''}>
              {b.icon}
            </button>
          ))}
        </div>
        <div style={{ position:'relative' }}>
          <ProductThumb product={product} height={130} iconSize={56}/>
          {outOfStock && <div style={{ position:'absolute', inset:0, background:'rgba(255,255,255,0.55)', backdropFilter:'grayscale(1)', borderRadius:0, display:'flex', alignItems:'center', justifyContent:'center' }}/>}
          {product.label && !outOfStock && window.PRODUCT_LABELS && (() => {
            const lbl = window.PRODUCT_LABELS.find(l => l.id === product.label);
            if (!lbl || !lbl.id) return null;
            return <div style={{ position:'absolute', bottom:7, left:7, background:lbl.bg, color:lbl.color, borderRadius:20, padding:'2px 9px', fontSize:11, fontWeight:800, boxShadow:'0 1px 5px rgba(0,0,0,0.12)' }}>{lbl.emoji} {lbl.label}</div>;
          })()}
        </div>
        <div style={{ padding:'14px 14px 13px', flex:1, display:'flex', flexDirection:'column', gap:6 }}>
          <div style={{ fontWeight:700, fontSize:15, color:outOfStock?'#aaa':'var(--text)', lineHeight:1.3 }}>
            {product.name}
            {isNew && !product.label && !outOfStock && <span style={{ marginRight:5, background:TEAL, color:'#fff', borderRadius:6, padding:'1px 6px', fontSize:10, fontWeight:800, verticalAlign:'middle' }}>جديد</span>}
          </div>
          <div style={{ fontSize:12, color:'#bbb' }}>{product.desc}</div>
          {!outOfStock && rating&&rating.count>0 && <StarRating avg={rating.avg} count={rating.count} small/>}
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginTop:4 }}>
            <div style={{ display:'flex', flexDirection:'column' }}>
              <span style={{ fontWeight:900, fontSize:18, color:outOfStock?'#bbb':GREEN }}>{fmt(finalPrice)}</span>
              {!outOfStock && product.discount>0 && <span style={{ fontSize:12, color:'#bbb', textDecoration:'line-through' }}>{fmt(product.price)}</span>}
            </div>
            {outOfStock ? (
              <button disabled style={{ background:'#eeeeee', color:'#aaa', border:'none', borderRadius:11, padding:'8px 14px', fontFamily:'Tajawal,sans-serif', fontSize:12, fontWeight:700, cursor:'not-allowed', whiteSpace:'nowrap' }}>نفذ المخزون</button>
            ) : (
              <button onClick={handleAdd} style={{ background:added?'#27ae60':GREEN, color:'#fff', border:'none', borderRadius:11, padding:'8px 16px', fontFamily:'Tajawal,sans-serif', fontSize:13, fontWeight:700, cursor:'pointer', transition:'all 0.2s', whiteSpace:'nowrap', display:'flex', alignItems:'center', gap:5 }}>
                {added ? <><CheckIcon size={14} color="#fff"/> أُضيف</> : inCart>0 ? <><PlusIcon size={14} color="#fff"/> ({inCart})</> : <><PlusIcon size={14} color="#fff"/> أضف</>}
              </button>
            )}
          </div>
        </div>
      </div>
    );
  }

  /* ── NotifCenterPanel ───────────────────────────────────────────────── */
  function NotifCenterPanel({ notifications, notifOn, onToggleNotif, onClose, onClear }) {
    const timeAgo = (ts) => {
      const s = Math.floor((Date.now() - ts) / 1000);
      if (s < 60)    return 'الآن';
      if (s < 3600)  return `منذ ${Math.floor(s/60)} دقيقة`;
      if (s < 86400) return `منذ ${Math.floor(s/3600)} ساعة`;
      return `منذ ${Math.floor(s/86400)} يوم`;
    };
    return (
      <div style={{ position:'fixed', inset:0, zIndex:2500, display:'flex', justifyContent:'flex-end', background:'rgba(0,0,0,0.38)' }} onClick={e=>e.target===e.currentTarget&&onClose()}>
        <div style={{ width:340, maxWidth:'92vw', background:'var(--surface)', height:'100%', display:'flex', flexDirection:'column', boxShadow:'-8px 0 32px rgba(0,0,0,0.15)', animation:'drawerIn 0.28s ease' }}>
          <div style={{ background:`linear-gradient(135deg,${GREEN},${TEAL})`, padding:'20px 18px', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
            <div style={{ display:'flex', alignItems:'center', gap:10 }}>
              <BellIcon size={22} color="#fff"/>
              <span style={{ color:'#fff', fontWeight:900, fontSize:17 }}>مركز الإشعارات</span>
            </div>
            <div style={{ display:'flex', gap:6 }}>
              {notifications.length>0 && (
                <button onClick={onClear} style={{ background:'rgba(255,255,255,0.18)', border:'none', borderRadius:8, padding:'5px 11px', cursor:'pointer', fontFamily:'Tajawal,sans-serif', fontSize:11, fontWeight:700, color:'#fff' }}>مسح الكل</button>
              )}
              <button onClick={onClose} style={{ background:'rgba(255,255,255,0.18)', border:'none', borderRadius:'50%', width:32, height:32, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}><XIcon size={15} color="#fff"/></button>
            </div>
          </div>
          <div style={{ padding:'12px 18px', borderBottom:'1px solid #f0f0f0', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
            <div>
              <div style={{ fontSize:13, fontWeight:700, color:DARK }}>إشعارات الجهاز</div>
              <div style={{ fontSize:11, color:'#aaa', marginTop:2 }}>تنبيهات انخفاض الأسعار والعروض</div>
            </div>
            <button onClick={onToggleNotif} style={{ width:48, height:26, borderRadius:13, background:notifOn?GREEN:'#ccc', border:'none', cursor:'pointer', position:'relative', transition:'background 0.25s', flexShrink:0, padding:0 }}>
              <div style={{ width:20, height:20, borderRadius:'50%', background:'#fff', position:'absolute', top:3, left:notifOn?25:3, transition:'left 0.25s', boxShadow:'0 1px 5px rgba(0,0,0,0.25)' }}/>
            </button>
          </div>
          <div style={{ flex:1, overflowY:'auto' }}>
            {notifications.length===0 ? (
              <div style={{ textAlign:'center', padding:'60px 20px', color:'#ccc' }}>
                <BellIcon size={52} color="#e8e8e8"/>
                <p style={{ marginTop:14, fontWeight:700, fontSize:14, color:'#c8c8c8' }}>لا توجد إشعارات بعد</p>
                <p style={{ fontSize:12, color:'#d8d8d8', marginTop:4 }}>ستظهر هنا جميع التنبيهات</p>
              </div>
            ) : (
              <div>
                {notifications.map((n, i) => {
                  const isUnread = n.time > (notifications._lastRead || 0);
                  return (
                    <div key={n.id} style={{ padding:'11px 18px', borderBottom:'1px solid #f0f2f5', background:i===0?'#fffde7':'#fff', display:'flex', gap:10, alignItems:'flex-start' }}>
                      <div style={{ width:34, height:34, borderRadius:'50%', background:GREEN+'18', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, marginTop:1, fontSize:16 }}>
                        {n.icon||'🔔'}
                      </div>
                      <div style={{ flex:1, minWidth:0 }}>
                        <div style={{ fontSize:13, color:DARK, fontWeight:600, lineHeight:1.6 }}>{n.msg}</div>
                        <div style={{ fontSize:11, color:'#bbb', marginTop:3 }}>{timeAgo(n.time)}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      </div>
    );
  }

  const FREE_DELIVERY_MIN = 80;

  function CartDrawer({ cart, products, onClose, onUpdate, storeOpen, smartTip, appliedCoupon, onApplyCoupon, onRemoveCoupon, onCheckout, coupons, userProfile, loyaltyPoints, waNumber, freeGiftConfig, isGuest }) {
    const [showCheckout, setShowCheckout] = useState(false);
    const [cartNotes,    setCartNotes]    = useState({});
    const [openNoteId,   setOpenNoteId]   = useState(null);
    const [useLoyalty,   setUseLoyalty]   = useState(false);
    const [giftAdded,    setGiftAdded]    = useState(false);
    const items = Object.entries(cart).map(([id,qty])=>({ product:products.find(p=>p.id===Number(id)), qty })).filter(x=>x.product);
    const total         = items.reduce((s,{product,qty})=>{ const p=product.discount>0?product.price*(1-product.discount/100):product.price; return s+p*qty; },0);
    const totalOriginal = items.reduce((s,{product,qty})=>s+product.price*qty, 0);
    const savings       = totalOriginal - total;
    const [couponInput, setCouponInput] = useState('');
    const [couponError, setCouponError] = useState('');
    const couponDiscount  = appliedCoupon ? (appliedCoupon.type==='percent' ? total*appliedCoupon.value/100 : Math.min(appliedCoupon.value,total)) : 0;
    const loyaltyDiscount = useLoyalty && loyaltyPoints > 0 ? Math.min(loyaltyPoints, Math.floor(Math.max(0, total - couponDiscount))) : 0;
    const finalTotal = Math.max(0, total - couponDiscount - loyaltyDiscount);
    const applyCoupon = () => {
      const code = couponInput.trim().toUpperCase();
      if (!coupons||!coupons[code]) { setCouponError('كود الخصم غير صحيح'); return; }
      onApplyCoupon({ code, ...coupons[code] });
      setCouponInput(''); setCouponError('');
    };
    return (
      <div style={{ position:'fixed', inset:0, zIndex:1000, display:'flex' }}>
        <div onClick={onClose} style={{ flex:1, background:'rgba(0,0,0,0.4)', cursor:'pointer' }}/>
        <div style={{ width:360, background:'var(--surface)', display:'flex', flexDirection:'column', boxShadow:'-4px 0 24px rgba(0,0,0,0.15)', animation:'drawerIn 0.28s ease' }}>
          <div style={{ padding:'18px 20px 16px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
            <h2 style={{ fontSize:19, fontWeight:900, color:'var(--text)', display:'flex', alignItems:'center', gap:8 }}><CartIcon size={22} color="var(--text)"/> السلة</h2>
            <button onClick={onClose} style={{ background:'var(--bg)', border:'none', borderRadius:'50%', width:36, height:36, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}><XIcon size={18} color="var(--text2)"/></button>
          </div>
          <div style={{ flex:1, overflowY:'auto', padding:16, display:'flex', flexDirection:'column', gap:12 }}>
            {items.length===0 ? (
              <div style={{ textAlign:'center', padding:'50px 20px', color:'#ccc' }}>
                <CartIcon size={56} color="#e0e0e0"/>
                <p style={{ fontWeight:600, fontSize:15, marginTop:14, color:'#bbb' }}>السلة فارغة</p>
              </div>
            ) : items.map(({product,qty})=>{
              const price  = product.discount>0?product.price*(1-product.discount/100):product.price;
              const bg     = CAT_BG[product.category]||'#f5f5f5';
              const ic     = CAT_IC[product.category]||'#bbb';
              const CatIco = window.CAT_ICONS && window.CAT_ICONS[product.category];
              return (
                <div key={product.id} style={{ background:'var(--surface2)', borderRadius:14, padding:12 }}>
                  <div style={{ display:'flex', gap:12, alignItems:'center' }}>
                    <div style={{ width:46, height:46, borderRadius:10, flexShrink:0, background:bg, overflow:'hidden', display:'flex', alignItems:'center', justifyContent:'center' }}>
                      {product.image ? <img src={product.image} alt={product.name} style={{ width:'100%', height:'100%', objectFit:'cover' }}/> : CatIco ? <CatIco size={26} color={ic}/> : null}
                    </div>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:14, fontWeight:700, color:'var(--text)' }}>{product.name}</div>
                      <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                        <span style={{ fontSize:13, color:GREEN, fontWeight:800 }}>{fmt(price)}</span>
                        <button onClick={()=>setOpenNoteId(openNoteId===product.id?null:product.id)} style={{ background:'none', border:'none', cursor:'pointer', fontSize:12, color:cartNotes[product.id]?TEAL:'#ccc', fontFamily:'Tajawal,sans-serif', fontWeight:700, padding:0, display:'flex', alignItems:'center', gap:3 }}>
                          📝{cartNotes[product.id]?<span style={{ fontSize:11, color:TEAL }}> ملاحظة ✓</span>:<span style={{ fontSize:11 }}> أضف ملاحظة</span>}
                        </button>
                      </div>
                    </div>
                    <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                      <button onClick={()=>onUpdate(product.id,qty-1)} style={{ width:28, height:28, borderRadius:'50%', border:`1.5px solid ${GREEN}`, background:'var(--surface)', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}><MinusIcon size={14} color={GREEN}/></button>
                      <span style={{ width:22, textAlign:'center', fontWeight:800, fontSize:15 }}>{qty}</span>
                      <button onClick={()=>onUpdate(product.id,qty+1)} style={{ width:28, height:28, borderRadius:'50%', background:GREEN, border:'none', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}><PlusIcon size={14} color="#fff"/></button>
                    </div>
                  </div>
                  {openNoteId===product.id && (
                    <div style={{ marginTop:8 }}>
                      <textarea value={cartNotes[product.id]||''} onChange={e=>setCartNotes(prev=>({...prev,[product.id]:e.target.value}))} placeholder="ملاحظة خاصة (مثال: بدون بصل، مقطّع شرائح...)" rows={2} style={{ width:'100%', padding:'8px 10px', border:'1.5px solid #e0e0e0', borderRadius:9, fontFamily:'Tajawal,sans-serif', fontSize:12, resize:'none', outline:'none', color:DARK, transition:'border-color 0.2s' }} onFocus={e=>e.target.style.borderColor=TEAL} onBlur={e=>e.target.style.borderColor='#e0e0e0'}/>
                    </div>
                  )}
                </div>
              );
            })}
            {smartTip && items.length>0 && (
              <div style={{ background:'linear-gradient(135deg,#e3f2fd,#e8f5e9)', border:'1.5px solid #b2dfdb', borderRadius:14, padding:'14px 16px' }}>
                <div style={{ fontSize:13, fontWeight:800, color:TEAL, marginBottom:6, display:'flex', alignItems:'center', gap:6 }}><BrainIcon size={15} color={TEAL}/> اقتراح ذكي — {smartTip.recipe}</div>
                <div style={{ fontSize:12, color:'#555', lineHeight:1.6 }}>أضف <strong>{smartTip.missing.join(' و ')}</strong> لتكمل هذه الوجبة!</div>
              </div>
            )}
          </div>
          {items.length>0 && (
            <div style={{ padding:'16px 20px', borderTop:'1px solid var(--border)' }}>
              {(() => {
                const remaining = Math.max(0, FREE_DELIVERY_MIN - finalTotal);
                const pct = Math.min(100, (finalTotal / FREE_DELIVERY_MIN) * 100);
                return remaining > 0 ? (
                  <div style={{ marginBottom:12, background:'#f8fafb', borderRadius:12, padding:'10px 14px', border:'1px solid #e8ecf0' }}>
                    <div style={{ display:'flex', justifyContent:'space-between', fontSize:12, fontWeight:700, color:'#666', marginBottom:7 }}>
                      <span>🚚 أضف <span style={{ color:GREEN, fontWeight:900 }}>{fmt(remaining)}</span> للتوصيل المجاني</span>
                      <span style={{ color:GREEN }}>{Math.round(pct)}%</span>
                    </div>
                    <div style={{ height:6, background:'#e0e0e0', borderRadius:3, overflow:'hidden' }}>
                      <div style={{ height:'100%', background:`linear-gradient(90deg,${GREEN},${TEAL})`, borderRadius:3, width:`${pct}%`, transition:'width 0.5s ease' }}/>
                    </div>
                  </div>
                ) : (
                  <div style={{ marginBottom:12, background:'#e8f5e9', borderRadius:12, padding:'10px 14px', border:'1px solid #a5d6a7', display:'flex', alignItems:'center', gap:8 }}>
                    <span style={{ fontSize:18 }}>🎉</span>
                    <span style={{ fontSize:13, fontWeight:800, color:'#2e7d32' }}>حصلت على توصيل مجاني!</span>
                  </div>
                );
              })()}
              {/* Free Gift Banner */}
              {freeGiftConfig?.enabled && freeGiftConfig?.productId && (() => {
                const giftProd = products.find(p=>p.id===freeGiftConfig.productId);
                if (!giftProd) return null;
                const eligible = finalTotal >= freeGiftConfig.minOrder;
                const remaining = freeGiftConfig.minOrder - finalTotal;
                return eligible ? (
                  <div style={{ marginBottom:12, background:'linear-gradient(135deg,#fff8e1,#fff3cd)', border:'1.5px solid #f9a825', borderRadius:14, padding:'12px 14px' }}>
                    <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:6 }}>
                      <span style={{ fontSize:20 }}>🎁</span>
                      <div>
                        <div style={{ fontSize:13, fontWeight:900, color:'#e65100' }}>تهانينا! أنت مؤهل لهدية مجانية</div>
                        <div style={{ fontSize:12, color:'#bf360c', marginTop:1 }}>{giftProd.name}</div>
                      </div>
                    </div>
                    {!giftAdded ? (
                      <button onClick={()=>setGiftAdded(true)}
                        style={{ width:'100%', background:'#f57f17', color:'#fff', border:'none', borderRadius:10, padding:'8px 0', fontFamily:'Tajawal,sans-serif', fontSize:13, fontWeight:800, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:6 }}>
                        <GiftIcon size={15} color="#fff"/> أضف هديتك المجانية
                      </button>
                    ) : (
                      <div style={{ display:'flex', alignItems:'center', gap:6, background:'#fff', borderRadius:10, padding:'7px 12px', fontSize:13, fontWeight:700, color:'#2e7d32' }}>
                        <CheckIcon size={14} color="#27ae60"/> تمت إضافة الهدية إلى طلبك!
                      </div>
                    )}
                  </div>
                ) : (
                  <div style={{ marginBottom:12, background:'#fffde7', border:'1px dashed #f9a825', borderRadius:12, padding:'9px 13px' }}>
