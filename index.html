  <!-- ── AIChat ── -->
  <script type="text/babel">
  const { useState: useStateAI, useRef: useRefAI, useEffect: useEffectAI } = React;
  const TEAL_AI = '#1F9FB3';
  const QUICK_ACTIONS = [
    { label:'وصفة من السلة',    prompt:'ما الوصفات التي أستطيع تحضيرها من المنتجات في سلتي الحالية؟' },
    { label:'ميزانية 50 شيكل', prompt:'معي 50 شيكل فقط، اقترح لي أفضل مشتريات لوجبات متكاملة ومغذية' },
    { label:'خيارات صحية',     prompt:'ما هي أفضل المنتجات الصحية المتوفرة وكيف أدمجها في وجبات يومية؟' },
    { label:'سناك للأمسية',    prompt:'أريد مسليات وسناكات مميزة للجلوس ومشاهدة فيلم الليلة' },
    { label:'سلة ذكية',        prompt:'بناءً على ما في سلتي، ماذا ينقصني لتكتمل وجبة لذيذة؟' },
  ];
  function TypingDots() {
    return (
      <div style={{ display:'flex', gap:5, padding:'4px 0' }}>
        {[0,1,2].map(i => (
          <div key={i} style={{
            width:8, height:8, borderRadius:'50%', background:'rgba(255,255,255,0.8)',
            animation:`aiDot 1.2s ${i*0.2}s ease-in-out infinite`,
          }}/>
        ))}
      </div>
    );
  }
  function AIChatMessage({ msg }) {
    const isUser = msg.role === 'user';
    return (
      <div style={{ display:'flex', justifyContent:isUser?'flex-start':'flex-end', marginBottom:10 }}>
        {!isUser && (
          <div style={{
            width:30, height:30, borderRadius:'50%',
            background:'linear-gradient(135deg, #1F9FB3, #0e7fa0)',
            display:'flex', alignItems:'center', justifyContent:'center',
            flexShrink:0, alignSelf:'flex-end', marginLeft:8,
          }}>
            <BotIcon size={16} color="#fff"/>
          </div>
        )}
        <div style={{
          maxWidth:'78%',
          background: isUser ? 'var(--surface2)' : 'linear-gradient(135deg, #1F9FB3, #0b7d96)',
          color: isUser ? 'var(--text)' : '#fff',
          borderRadius: isUser ? '4px 16px 16px 16px' : '16px 4px 16px 16px',
          padding:'10px 14px', fontSize:14, lineHeight:1.65, whiteSpace:'pre-wrap',
          boxShadow: isUser ? 'none' : '0 2px 8px rgba(31,159,179,0.25)',
          border: isUser ? '1px solid var(--border)' : 'none',
        }}>{msg.content}</div>
      </div>
    );
  }
  function AIChat({ products, cart, onClose }) {
    const [messages, setMessages] = useStateAI([{
      role:'assistant',
      content:'أهلاً وسهلاً! أنا مساعدك الذكي في Top Quality Super Market.\n\nأقدر أساعدك بـ:\n- وصفات من المنتجات المتاحة\n- تخطيط الميزانية\n- اقتراحات ذكية للسلة\n- اختيارات صحية\n\nكيف أقدر أخدمك اليوم؟',
    }]);
    const [input,   setInput]   = useStateAI('');
    const [loading, setLoading] = useStateAI(false);
    const scrollRef  = useRefAI(null);
    const inputRef   = useRefAI(null);
    const lastSendTs = useRefAI(0);
    const MSG_LIMIT  = 20;
    useEffectAI(() => {
      if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
    }, [messages, loading]);
    const buildContext = () => {
      const pList = products.map(p => `${p.name} (${p.price}₪${p.discount>0?', خصم '+p.discount+'%':''})`).join(' | ');
      const cartItems = Object.entries(cart||{}).map(([id,qty]) => {
        const p = products.find(x => x.id === Number(id));
        return p ? `${p.name} x${qty}` : null;
      }).filter(Boolean).join('، ');
      return `أنت مساعد ذكي لسوبرماركت "Top Quality Super Market".\nالمنتجات المتاحة: ${pList}.\n${cartItems?`السلة الحالية للعميل: ${cartItems}.`:'السلة فارغة حالياً.'}\nمهمتك: مساعدة العميل بوصفات، تخطيط ميزانية، اقتراحات ذكية للسلة، اختيارات صحية.\nأجب بالعربية بأسلوب ودود ومختصر. إذا ذكرت منتجات، اذكر سعرها.`;
    };
    const send = async (text) => {
      const msg = (text !== undefined ? text : input).trim();
      if (!msg || loading) return;
      // Rate-limit: 2 s between sends
      const now = Date.now();
      if (now - lastSendTs.current < 2000) {
        setMessages(prev => [...prev, { role:'assistant', content:'⏱️ انتظر لحظة قبل إرسال رسالة أخرى.' }]);
        return;
      }
      // Session cap: 20 user messages max
      const userCount = messages.filter(m => m.role === 'user').length;
      if (userCount >= MSG_LIMIT) {
        setMessages(prev => [...prev, { role:'assistant', content:'⚠️ وصلت لحد الرسائل في هذه الجلسة (20 رسالة). أغلق النافذة وافتحها من جديد.' }]);
        return;
      }
      lastSendTs.current = now;
      setMessages(prev => [...prev, { role:'user', content:msg }]);
      setInput('');
      setLoading(true);
      try {
        const resp = await window.claude.complete({ messages:[{ role:'user', content:buildContext()+'\n\nسؤال العميل: '+msg }] });
        setMessages(prev => [...prev, { role:'assistant', content:resp }]);
      } catch {
        setMessages(prev => [...prev, { role:'assistant', content:'عذراً، حدث خطأ في الاتصال. حاول مرة أخرى.' }]);
      }
      setLoading(false);
      setTimeout(() => inputRef.current && inputRef.current.focus(), 100);
    };
    return (
      <div style={{ position:'fixed', inset:0, zIndex:3000, display:'flex', alignItems:'center', justifyContent:'center', background:'rgba(0,0,0,0.55)', backdropFilter:'blur(4px)' }}
        onClick={e => e.target === e.currentTarget && onClose()}>
        <style>{`@keyframes aiDot{0%,60%,100%{transform:translateY(0);opacity:.6}30%{transform:translateY(-7px);opacity:1}}@keyframes aiSlideUp{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}`}</style>
        <div style={{ background:'var(--surface)', borderRadius:22, width:430, maxWidth:'95vw', maxHeight:'88vh', display:'flex', flexDirection:'column', boxShadow:'0 24px 64px rgba(0,0,0,0.22)', overflow:'hidden', animation:'aiSlideUp 0.28s ease' }}>

      reader.onload = (e) => onChange(e.target.result);
      reader.readAsDataURL(file);
    };
    const onDrop = (e) => { e.preventDefault(); setDrag(false); handleFile(e.dataTransfer.files[0]); };
    return (
      <div>
        <input ref={fileRef} type="file" accept="image/*" style={{ display:'none' }} onChange={e=>handleFile(e.target.files[0])}/>

  function SalesChart({ products }) {
    const DAYS = ['أحد','اثن','ثلا','أرب','خمي','جمع','سبت'];
    const today = new Date().getDay();
    const seed  = d => (((Math.sin(d*9301+49297)*233280)%1)+1)/2;
    const base  = Math.max(products.length*3, 30);
    const data  = Array.from({length:7},(_,i)=>{
      const dayIdx=(today-6+i+7)%7;
      return { day:DAYS[dayIdx], val:Math.round(seed(dayIdx+1)*base+15), isToday:i===6 };
    });
    const peak = Math.max(...data.map(d=>d.val));
    return (
      <div style={{ background:'var(--surface)', borderRadius:16, padding:24, boxShadow:'var(--card-shadow)', marginBottom:24 }}>
        <h2 style={{ fontSize:16, fontWeight:800, color:D, marginBottom:20, display:'flex', alignItems:'center', gap:8 }}>
          <BarChartIcon size={17} color={D}/> مبيعات آخر 7 أيام
        </h2>
        <div style={{ display:'flex', gap:10, alignItems:'flex-end', height:150, direction:'ltr' }}>
          {data.map((d,i)=>(
            <div key={i} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:5 }}>
              <span style={{ fontSize:11, fontWeight:700, color:d.isToday?G:'#999' }}>₪{d.val}</span>
              <div style={{ width:'100%', borderRadius:'5px 5px 0 0', background:d.isToday?`linear-gradient(180deg,${G},${T})`:'#e8f5e9', height:`${(d.val/peak)*110}px`, transition:'height 0.5s ease' }}/>
              <span style={{ fontSize:11, color:d.isToday?G:'#aaa', fontWeight:d.isToday?800:500 }}>{d.day}</span>
            </div>
          ))}
        </div>
      </div>
    );
  }

  function CouponsTab({ coupons, setCoupons, showToast }) {

            </select>
            {inp(val, setVal, type==='percent'?'النسبة (1-100)':'القيمة بالشيكل', { width:140 })}

                    <div style={{ fontWeight:700, fontSize:14, color:D }}>{cp.label}</div>
                    <div style={{ fontSize:12, color:'#aaa' }}>{cp.type==='percent'?`${cp.value}% خصم`:`₪${cp.value} خصم ثابت`}</div>
                  </div>
                </div>
                <button onClick={()=>{ setCoupons(prev=>{const n={...prev};delete n[c];return n;}); showToast('تم حذف الكوبون','#e74c3c'); }} style={{ background:'#fce4ec', border:'none', borderRadius:8, padding:'7px 12px', cursor:'pointer', display:'flex', alignItems:'center', gap:4, color:'#e74c3c', fontFamily:'Tajawal,sans-serif', fontSize:12, fontWeight:700 }}>
                  <TrashIcon size={14} color="#e74c3c"/> حذف
                </button>
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

    const isMobile = adminW < 640;

    const showToast = (msg, color=G) => { setToast({msg,color}); setTimeout(()=>setToast(null),3000); };
    const handleAddProduct  = (form) => { setProducts(prev=>[...prev,{...form,id:nextId.current++}]); setShowAdd(false); showToast('تم إضافة المنتج بنجاح'); sendBroadcast(`🆕 منتج جديد وصل: ${form.name} — ₪${Number(form.price).toFixed(2)}`); };
    const handleEditProduct = (form) => { setProducts(prev=>prev.map(p=>p.id===editProduct.id?{...p,...form}:p)); setEditProduct(null); showToast('تم تعديل المنتج بنجاح'); };
    const handleDelete      = (id)   => { setProducts(prev=>prev.filter(p=>p.id!==id)); setDeleteConfirm(null); showToast('تم حذف المنتج','#e74c3c'); };
    const exportCSV = () => {
      const hdr = 'id,name,category,price,discount,stock,desc';
      const rows = products.map(p=>`${p.id},"${(p.name||'').replace(/"/g,'""')}",${p.category},${p.price},${p.discount},${p.stock},"${(p.desc||'').replace(/"/g,'""')}"`);
      const csv = '﻿' + [hdr,...rows].join('\n');
      const url = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
      const a = document.createElement('a'); a.href=url; a.download='products.csv'; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
      showToast(`تم تصدير ${products.length} منتج`);
    };
    const importCSV = (e) => {
      const file = e.target.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const lines = ev.target.result.replace(/\r/g,'').split('\n').filter(l=>l.trim());
          const parsed = lines.slice(1).map(line=>{
            const m=line.match(/("(?:[^"]|"")*"|[^,]*)/g)||[];
            const v=m.map(x=>x.replace(/^"|"$/g,'').replace(/""/g,'"'));
            return { id:nextId.current++, name:v[1]||'', category:v[2]||'dairy', price:parseFloat(v[3])||0, discount:parseInt(v[4])||0, stock:parseInt(v[5])||0, desc:v[6]||'', image:null };
          }).filter(p=>p.name);
          setProducts(prev=>[...prev,...parsed]);
          showToast(`تم استيراد ${parsed.length} منتج`);
        } catch { showToast('خطأ في قراءة الملف','#e74c3c'); }
      };
      reader.readAsText(file,'UTF-8');
      e.target.value='';
    };

    const filteredProds   = products.filter(p=>!search||normalizeAr(p.name).includes(normalizeAr(search)));
    const catCounts       = window.CATEGORIES.filter(c=>c.id!=='all').map(c=>({...c,count:products.filter(p=>p.category===c.id).length}));
    const discountedCount = products.filter(p=>p.discount>0).length;
    const lowStockCount   = products.filter(p=>p.stock<15).length;
    const totalRevenue = orders ? orders.reduce((s,o)=>s+o.total,0) : 0;
    const avgOrder     = orders && orders.length ? totalRevenue/orders.length : 0;
    const topProducts  = (() => {
      const cnt = {};
      (orders||[]).forEach(o=>o.items.forEach(i=>{ cnt[i.id]=(cnt[i.id]||0)+i.qty; }));
      return Object.entries(cnt).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([id,qty])=>({
        product: products.find(p=>p.id===Number(id)), qty
      })).filter(x=>x.product);
    })();
    const sideItems = [
      { id:'dashboard', label:'لوحة التحكم', icon:<BarChartIcon    size={18}/> },
      { id:'products',  label:'المنتجات',    icon:<PackageIcon     size={18}/> },
      { id:'orders',    label:'الطلبات',     icon:<ShoppingBagIcon size={18}/> },
      { id:'coupons',   label:'الكوبونات',   icon:<PercentIcon     size={18}/> },
      { id:'settings',  label:'الإعدادات',   icon:<SettingsIcon    size={18}/> },
    ];

    return (
      <div style={{ minHeight:'100vh', background:'var(--bg)', display:'flex', flexDirection:isMobile?'column':'row', fontFamily:'Tajawal,sans-serif' }}>
        {toast && <div style={{ position:'fixed', bottom:24, left:'50%', transform:'translateX(-50%)', background:toast.color, color:'#fff', padding:'12px 28px', borderRadius:30, fontSize:14, fontWeight:700, boxShadow:'0 4px 20px rgba(0,0,0,0.2)', zIndex:9999 }}>{toast.msg}</div>}

        {/* ── Sidebar (desktop) / Top nav (mobile) ─── */}
        {isMobile ? (
          <div style={{ background:'var(--surface)', borderBottom:'1px solid var(--border)', position:'sticky', top:0, zIndex:100 }}>
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'10px 14px', borderBottom:'1px solid var(--border)' }}>
              <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                <div style={{ width:30, height:30, background:`linear-gradient(135deg,${G},${T})`, borderRadius:8, display:'flex', alignItems:'center', justifyContent:'center' }}>
                  <CartIcon size={16} color="#fff"/>
                </div>
                <span style={{ fontWeight:900, fontSize:13, color:D }}>لوحة الإدارة</span>
              </div>
              <button onClick={onExit} style={{ background:'#fff3e0', border:'none', borderRadius:8, padding:'6px 12px', cursor:'pointer', fontFamily:'Tajawal,sans-serif', fontSize:12, fontWeight:700, color:'#e67e22', display:'flex', alignItems:'center', gap:6 }}>
                <StoreIcon size={14} color="#e67e22"/> المتجر
              </button>
            </div>
            <nav style={{ display:'flex', overflowX:'auto', padding:'6px 8px', gap:4 }}>
              {sideItems.map(s=>(
                <button key={s.id} onClick={()=>setTab(s.id)}
                  style={{ flexShrink:0, padding:'7px 12px', background:tab===s.id?G:'transparent', border:tab===s.id?'none':'1px solid var(--border)', borderRadius:20, display:'flex', alignItems:'center', gap:6, cursor:'pointer', fontFamily:'Tajawal,sans-serif', fontSize:12, fontWeight:700, color:tab===s.id?'#fff':'var(--text2)', transition:'all 0.18s', whiteSpace:'nowrap' }}>
                  <span style={{ color:tab===s.id?'#fff':'var(--text3)' }}>{s.icon}</span>{s.label}
                </button>
              ))}
            </nav>
          </div>
        ) : (
          <div style={{ width:220, background:'var(--surface)', flexShrink:0, boxShadow:'2px 0 12px rgba(0,0,0,0.07)', display:'flex', flexDirection:'column', minHeight:'100vh' }}>
            <div style={{ padding:'22px 20px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', gap:10 }}>
              <div style={{ width:38, height:38, background:`linear-gradient(135deg,${G},${T})`, borderRadius:10, display:'flex', alignItems:'center', justifyContent:'center' }}>
                <CartIcon size={20} color="#fff"/>
              </div>
              <div>
                <div style={{ fontWeight:900, fontSize:13, color:D }}>Top Quality</div>
                <div style={{ fontSize:11, color:'#888' }}>لوحة الإدارة</div>
              </div>
            </div>
            <nav style={{ padding:'12px 10px', flex:1 }}>
              {sideItems.map(s=>(
                <button key={s.id} onClick={()=>setTab(s.id)} style={{ width:'100%', padding:'11px 14px', background:tab===s.id?G+'18':'transparent', border:'none', borderRadius:10, display:'flex', alignItems:'center', gap:10, cursor:'pointer', fontFamily:'Tajawal,sans-serif', fontSize:14, fontWeight:tab===s.id?700:500, color:tab===s.id?G:'var(--text2)', marginBottom:4, transition:'all 0.18s', textAlign:'right' }}>
                  <span style={{ color:tab===s.id?G:'var(--text3)' }}>{s.icon}</span>{s.label}
                </button>
              ))}
            </nav>
            <div style={{ padding:'12px 10px', borderTop:'1px solid var(--border)' }}>
              <button onClick={onExit} style={{ width:'100%', padding:'10px 14px', background:'#fff3e0', border:'none', borderRadius:10, cursor:'pointer', fontFamily:'Tajawal,sans-serif', fontSize:13, fontWeight:700, color:'#e67e22', display:'flex', alignItems:'center', gap:8 }}>
                <StoreIcon size={16} color="#e67e22"/> العودة للمتجر
              </button>
            </div>
          </div>
        )}

        <div style={{ flex:1, padding:isMobile?16:28, overflowY:'auto' }}>
          {tab==='dashboard' && (
            <div>
              <h1 style={{ fontSize:22, fontWeight:900, color:D, marginBottom:24, display:'flex', alignItems:'center', gap:10 }}><BarChartIcon size={22} color={D}/> لوحة التحكم</h1>
              <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))', gap:16, marginBottom:28 }}>
                <StatCard label="إجمالي المنتجات" value={products.length}            icon={<PackageIcon     size={26} color={T}/>}      color={T}/>
                <StatCard label="منتجات بخصم"      value={discountedCount}            icon={<TagIcon         size={26} color="#e67e22"/>} color="#e67e22"/>
                <StatCard label="إجمالي الطلبات"   value={orders?orders.length:0}    icon={<ShoppingBagIcon size={26} color="#8e44ad"/>} color="#8e44ad"/>
                <StatCard label="إجمالي الإيرادات" value={`₪${totalRevenue.toFixed(0)}`} icon={<PercentIcon size={26} color={G}/>}      color={G}/>
                <StatCard label="متوسط الطلب"      value={`₪${avgOrder.toFixed(0)}`} icon={<BarChartIcon    size={26} color={T}/>}      color={T}/>
                <StatCard label="مخزون منخفض"      value={lowStockCount}             icon={<AlertIcon       size={26} color="#e74c3c"/>} color="#e74c3c"/>
              </div>
              <SalesChart products={products}/>
              <div style={{ background:'var(--surface)', borderRadius:16, padding:24, boxShadow:'var(--card-shadow)', marginBottom:24 }}>
                <h2 style={{ fontSize:16, fontWeight:800, color:D, marginBottom:18, display:'flex', alignItems:'center', gap:8 }}><LayersIcon size={17} color={D}/> توزيع المنتجات بالتصنيف</h2>
                <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
                  {catCounts.map(c=>{
                    const CatIco = window.CAT_ICONS && window.CAT_ICONS[c.id];
                    const ic = CAT_IC_COLOR[c.id]||'#888';
                    return (
                      <div key={c.id} style={{ display:'flex', alignItems:'center', gap:12 }}>
                        <span style={{ width:24 }}>{CatIco && <CatIco size={20} color={ic}/>}</span>
                        <span style={{ width:130, fontSize:13, color:'#555', fontWeight:600 }}>{c.name}</span>
                        <div style={{ flex:1, height:8, background:'#f0f0f0', borderRadius:4, overflow:'hidden' }}>
                          <div style={{ height:'100%', borderRadius:4, background:`linear-gradient(90deg,${G},${T})`, width:`${(c.count/products.length)*100}%`, transition:'width 0.4s ease' }}/>
                        </div>
                        <span style={{ fontSize:13, fontWeight:700, color:D, width:28, textAlign:'center' }}>{c.count}</span>
                      </div>
                    );
                  })}
                </div>
              </div>
              {topProducts.length>0 && (
                <div style={{ background:'var(--surface)', borderRadius:16, padding:24, boxShadow:'var(--card-shadow)', marginBottom:24 }}>
                  <h2 style={{ fontSize:16, fontWeight:800, color:D, marginBottom:16, display:'flex', alignItems:'center', gap:8 }}><BarChartIcon size={17} color={D}/> أكثر المنتجات مبيعاً</h2>
                  <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
                    {topProducts.map(({product:p,qty},i)=>{
                      const maxQ = topProducts[0].qty;
                      return (
                        <div key={p.id} style={{ display:'flex', alignItems:'center', gap:12 }}>
                          <span style={{ width:22, height:22, borderRadius:'50%', background:i===0?'#f39c12':i===1?'#bdc3c7':i===2?'#cd7f32':'#eee', color:i<3?'#fff':'#888', display:'flex', alignItems:'center', justifyContent:'center', fontSize:11, fontWeight:900, flexShrink:0 }}>{i+1}</span>
                          <span style={{ width:140, fontSize:13, fontWeight:600, color:'#555', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{p.name}</span>
                          <div style={{ flex:1, height:8, background:'#f0f0f0', borderRadius:4, overflow:'hidden' }}>
                            <div style={{ height:'100%', borderRadius:4, background:`linear-gradient(90deg,${G},${T})`, width:`${(qty/maxQ)*100}%` }}/>
                          </div>
                          <span style={{ fontSize:13, fontWeight:700, color:G, width:40, textAlign:'center' }}>{qty}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
              {lowStockCount>0 && (
                <div style={{ background:'#fff3e0', border:'1.5px solid #ffe0b2', borderRadius:14, padding:'16px 20px' }}>
                  <h3 style={{ fontSize:14, fontWeight:800, color:'#e67e22', marginBottom:10, display:'flex', alignItems:'center', gap:6 }}><AlertIcon size={16} color="#e67e22"/> منتجات ذات مخزون منخفض (أقل من 15)</h3>
                  <div style={{ display:'flex', flexWrap:'wrap', gap:8 }}>
                    {products.filter(p=>p.stock<15).map(p=>(
                      <div key={p.id} style={{ display:'flex', alignItems:'center', gap:6, background:'#fff', borderRadius:20, padding:'4px 6px 4px 12px', border:'1px solid #ffcc80' }}>
                        <span style={{ fontSize:13, fontWeight:600, color:'#e67e22' }}>{p.name} ({p.stock})</span>
                        <button onClick={()=>{ setProducts(prev=>prev.map(x=>x.id===p.id?{...x,stock:x.stock+20}:x)); showToast(`${p.name}: +20 وحدة`); }} style={{ background:'#e67e22', border:'none', borderRadius:14, padding:'3px 9px', cursor:'pointer', color:'#fff', fontSize:12, fontWeight:700 }}>+20</button>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          )}

          {tab==='products' && (
            <div>
              <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:20 }}>
                <h1 style={{ fontSize:22, fontWeight:900, color:D, display:'flex', alignItems:'center', gap:10 }}><PackageIcon size={22} color={D}/> إدارة المنتجات</h1>
                <div style={{ display:'flex', gap:8 }}>
                  <input ref={csvImportRef} type="file" accept=".csv" style={{ display:'none' }} onChange={importCSV}/>
                  <button onClick={exportCSV} style={{ background:'#fff', color:'#555', border:'1.5px solid #e0e0e0', borderRadius:12, padding:'10px 16px', fontFamily:'Tajawal,sans-serif', fontSize:13, fontWeight:700, cursor:'pointer', display:'flex', alignItems:'center', gap:6 }}>
                    <DownloadIcon size={15} color="#555"/> تصدير CSV
                  </button>
                  <button onClick={()=>csvImportRef.current.click()} style={{ background:'#fff', color:'#555', border:'1.5px solid #e0e0e0', borderRadius:12, padding:'10px 16px', fontFamily:'Tajawal,sans-serif', fontSize:13, fontWeight:700, cursor:'pointer', display:'flex', alignItems:'center', gap:6 }}>
                    <UploadIcon size={15} color="#555"/> استيراد CSV
                  </button>
                  <button onClick={()=>setShowAdd(true)} style={{ background:G, color:'#fff', border:'none', borderRadius:12, padding:'10px 20px', fontFamily:'Tajawal,sans-serif', fontSize:14, fontWeight:700, cursor:'pointer', display:'flex', alignItems:'center', gap:8 }}>
                    <PlusIcon size={16} color="#fff"/> إضافة منتج
                  </button>
                </div>
              </div>
              <div style={{ position:'relative', marginBottom:16 }}>
                <div style={{ position:'absolute', right:12, top:'50%', transform:'translateY(-50%)' }}><SearchIcon size={16} color="#bbb"/></div>
                <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="ابحث عن منتج..."
                  style={{ width:'100%', padding:'10px 16px 10px 16px', paddingRight:38, border:'2px solid #e0e0e0', borderRadius:12, fontFamily:'Tajawal,sans-serif', fontSize:14, outline:'none', color:D, transition:'border-color 0.2s' }}
                  onFocus={e=>e.target.style.borderColor=G} onBlur={e=>e.target.style.borderColor='#e0e0e0'}/>
              </div>
              <div style={{ background:'var(--surface)', borderRadius:16, overflow:'hidden', boxShadow:'var(--card-shadow)' }}>
                {/* رأس الجدول — ديسكتوب فقط */}
                {!isMobile && (
                  <div style={{ display:'grid', gridTemplateColumns:'52px 1fr 100px 80px 65px 75px 120px', padding:'12px 16px', background:'var(--surface2)', fontSize:12, fontWeight:800, color:'var(--text2)', gap:8, borderBottom:'1px solid var(--border)' }}>
                    <span/><span>المنتج</span><span>التصنيف</span><span>السعر</span><span>الخصم</span><span>المخزون</span><span>إجراءات</span>
                  </div>
                )}
                {filteredProds.map((p,idx)=>{
                  const cat    = window.CATEGORIES.find(c=>c.id===p.category);
                  const bg     = CAT_BG_ADMIN[p.category]||'#f5f5f5';
                  const ic     = CAT_IC_COLOR[p.category]||'#bbb';
                  const CatIco = window.CAT_ICONS && window.CAT_ICONS[p.category];
                  const ActionBtns = () => (
                    <div style={{ display:'flex', gap:5, flexWrap:'wrap' }}>
                      <button onClick={()=>{ const on=!p.featured; setProducts(prev=>prev.map(x=>x.id===p.id?{...x,featured:on}:on?{...x,featured:false}:x)); showToast(on?`🌟 ${p.name} أصبح منتج اليوم`:`تم إلغاء منتج اليوم`); }} title="منتج اليوم" style={{ background:p.featured?'#fff8e1':'var(--surface2)', border:p.featured?'1.5px solid #f39c12':'1.5px solid var(--border)', borderRadius:8, padding:'5px 8px', cursor:'pointer', fontSize:13, lineHeight:1, color:p.featured?'#f39c12':'var(--text3)' }}>🌟</button>
                      <button onClick={()=>{ const on=!p.flashDeal; setProducts(prev=>prev.map(x=>x.id===p.id?{...x,flashDeal:on,flashEndsAt:on?new Date(Date.now()+6*3600*1000).toISOString():null}:x)); showToast(on?`⚡ فُعّل عرض الفلاش لـ ${p.name}`:`تم إلغاء الفلاش`); if(on) sendBroadcast(`⚡ عرض فلاش! ${p.name} بسعر مخفوض — سارع بالشراء قبل انتهاء العرض!`); }} title="عرض الفلاش" style={{ background:p.flashDeal?'#fff3e0':'var(--surface2)', border:p.flashDeal?'1.5px solid #f39c12':'1.5px solid var(--border)', borderRadius:8, padding:'5px 8px', cursor:'pointer', fontSize:14, lineHeight:1, color:p.flashDeal?'#e74c3c':'var(--text3)' }}>⚡</button>
                      <button onClick={()=>setEditProduct(p)} style={{ background:T+'18', border:'none', borderRadius:8, padding:'7px 10px', cursor:'pointer', display:'flex', alignItems:'center', gap:4 }}><PencilIcon size={14} color={T}/>{isMobile&&<span style={{fontSize:12,color:T,fontWeight:700}}>تعديل</span>}</button>
                      <button onClick={()=>setDeleteConfirm(p)} style={{ background:'#fce4ec', border:'none', borderRadius:8, padding:'7px 10px', cursor:'pointer', display:'flex', alignItems:'center', gap:4 }}><TrashIcon size={14} color="#e74c3c"/>{isMobile&&<span style={{fontSize:12,color:'#e74c3c',fontWeight:700}}>حذف</span>}</button>
                    </div>
                  );
                  if (isMobile) return (
                    <div key={p.id} style={{ padding:'14px 16px', borderBottom:idx<filteredProds.length-1?'1px solid var(--border)':'none' }}>
                      <div style={{ display:'flex', gap:12, alignItems:'flex-start' }}>
                        <div style={{ width:48, height:48, borderRadius:10, flexShrink:0, background:bg, overflow:'hidden', display:'flex', alignItems:'center', justifyContent:'center' }}>
                          {p.image?<img src={p.image} style={{ width:'100%',height:'100%',objectFit:'cover' }}/>:CatIco?<CatIco size={24} color={ic}/>:null}
                        </div>
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ fontWeight:700, fontSize:14, color:'var(--text)', display:'flex', flexWrap:'wrap', gap:4, alignItems:'center' }}>
                            {p.name}
                            {p.label && (() => { const lbl=PRODUCT_LABELS.find(l=>l.id===p.label); return lbl&&lbl.id?<span style={{ fontSize:10,color:lbl.color,background:lbl.bg,borderRadius:10,padding:'1px 6px' }}>{lbl.emoji} {lbl.label}</span>:null; })()}
                            {p.flashDeal && <span style={{ fontSize:10,color:'#e74c3c',background:'#fce4ec',borderRadius:10,padding:'1px 6px' }}>⚡ فلاش</span>}
                          </div>
                          <div style={{ display:'flex', gap:12, marginTop:6, flexWrap:'wrap' }}>
                            <span style={{ fontSize:12, fontWeight:800, color:G }}>₪{p.price.toFixed(2)}</span>
                            {p.discount>0&&<span style={{ fontSize:12,fontWeight:700,color:'#e74c3c' }}>-{p.discount}%</span>}
                            <span style={{ fontSize:12,color:p.stock<15?'#e74c3c':'#27ae60',fontWeight:700 }}>مخزون: {p.stock}</span>
                            <span style={{ fontSize:11,color:T,background:T+'12',borderRadius:12,padding:'1px 8px',fontWeight:600 }}>{cat?cat.name:p.category}</span>
                          </div>
                        </div>
                      </div>
                      <div style={{ marginTop:10 }}><ActionBtns/></div>
                    </div>
                  );
                  return (
                    <div key={p.id} style={{ display:'grid', gridTemplateColumns:'52px 1fr 100px 80px 65px 75px 120px', padding:'12px 16px', gap:8, alignItems:'center', borderBottom:idx<filteredProds.length-1?'1px solid var(--border)':'none', transition:'background 0.15s' }}
                      onMouseEnter={e=>e.currentTarget.style.background='var(--surface2)'} onMouseLeave={e=>e.currentTarget.style.background=''}>
                      <div style={{ width:44, height:44, borderRadius:10, flexShrink:0, background:bg, overflow:'hidden', display:'flex', alignItems:'center', justifyContent:'center' }}>
                        {p.image?<img src={p.image} alt={p.name} style={{ width:'100%',height:'100%',objectFit:'cover' }}/>:CatIco?<CatIco size={24} color={ic}/>:null}
                      </div>
                      <div>
                        <div style={{ fontWeight:700, fontSize:13, color:'var(--text)', display:'flex', alignItems:'center', gap:5, flexWrap:'wrap' }}>
                          {p.name}
                          {p.label && (() => { const lbl=PRODUCT_LABELS.find(l=>l.id===p.label); return lbl&&lbl.id?<span style={{ fontSize:10,fontWeight:800,color:lbl.color,background:lbl.bg,borderRadius:10,padding:'1px 7px' }}>{lbl.emoji} {lbl.label}</span>:null; })()}
                          {p.flashDeal&&<span style={{ fontSize:10,fontWeight:800,color:'#e74c3c',background:'#fce4ec',borderRadius:10,padding:'1px 7px' }}>⚡ فلاش</span>}
                        </div>
                        <div style={{ fontSize:11, color:'var(--text3)' }}>{p.desc}</div>
                      </div>
                      <span style={{ fontSize:11, fontWeight:600, color:T, background:T+'12', padding:'3px 8px', borderRadius:20, width:'fit-content' }}>{cat?cat.name:p.category}</span>
                      <span style={{ fontWeight:800, color:G, fontSize:13 }}>₪{p.price.toFixed(2)}</span>
                      <span style={{ fontWeight:700, fontSize:12, color:p.discount>0?'#e74c3c':'var(--text3)' }}>{p.discount>0?`-${p.discount}%`:'—'}</span>
                      <span style={{ fontWeight:700, fontSize:12, color:p.stock<15?'#e74c3c':'#27ae60' }}>{p.stock}</span>
                      <ActionBtns/>
                    </div>
                  );

    if (typeof s !== 'string') return '';
    return s
      .replace(/[ؐ-ًؚ-ٟ]/g, '') // حذف التشكيل والحركات
      .replace(/[أإآٱ]/g, 'ا')                       // توحيد أشكال الألف

      .toLowerCase();

  const CAT_BG = { dairy:'#e8f5e9', snacks:'#fff8e1', produce:'#f1f8e9', beverages:'#e3f2fd', bakery:'#fef9e7', meat:'#fce4ec', grains:'#fafaf0' };
  const CAT_IC  = { dairy:'#7cb342', snacks:'#ffa726', produce:'#66bb6a', beverages:'#42a5f5', bakery:'#ff8f00', meat:'#ef5350', grains:'#8d6e63' };

  /* ── OfferBanner ─────────────────────────────────────────────────────── */
  function OfferBanner({ onFilterCat }) {
    const [slide,    setSlide]    = useState(0);
    const [timeLeft, setTimeLeft] = useState(23*3600 + 59*60 + 57);

      const t = setInterval(() => setSlide(s => (s+1) % OFFERS.length), 4500);

    useEffect(() => {
      const t = setInterval(() => setTimeLeft(s => s > 0 ? s-1 : 0), 1000);

  /* ── BulkDealsSection ─────────────────────────────────────────────────── */
  function BulkDealsSection({ cart, products }) {
    const anyInCart = BULK_DEALS.some(d => {
      const qty = Object.entries(cart).reduce((s,[id,q])=>{ const p=products.find(x=>x.id===Number(id)); return s+(p&&p.category===d.cat?q:0); },0);
      return qty > 0;
    });
    return (
      <div style={{ marginBottom:28 }}>
        <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:14 }}>
          <h2 style={{ fontSize:17, fontWeight:900, color:DARK }}>🎁 عروض الكميات</h2>

        </div>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(190px,1fr))', gap:12 }}>
          {BULK_DEALS.map(deal => {
            const qty = Object.entries(cart).reduce((s,[id,q])=>{ const p=products.find(x=>x.id===Number(id)); return s+(p&&p.category===deal.cat?q:0); },0);
            const pct = Math.min(qty/deal.minQty, 1);
            const done = qty >= deal.minQty;
            return (
              <div key={deal.id} style={{ background:done?'#e8f5e9':'#fff', borderRadius:14, padding:'14px 16px', border:`2px solid ${done?GREEN:'#f0f0f0'}`, transition:'all 0.3s' }}>

                </div>
              </div>
            );
          })}
        </div>
      </div>
    );

  const BESTSELLER_IDS = [25, 2, 28, 18, 7, 11];
  function getSmartSuggestion(cart, products) {
    const names = Object.keys(cart).map(id=>{ const p=products.find(x=>x.id===Number(id)); return p?p.name:''; });
    for (const r of RECIPES) {
      const have    = r.needs.filter(n=>names.some(c=>c.includes(n.split(' ')[0])));
      const missing = r.needs.filter(n=>!names.some(c=>c.includes(n.split(' ')[0])));
      if (have.length>=2 && missing.length>0 && missing.length<=3) return { recipe:r.name, missing:missing.slice(0,2) };
    }
    return null;
  }

    const [showPw,  setShowPw]  = useState(false);
    const upd = (k,v) => setForm(prev=>({...prev,[k]:v}));

    const hashPwd = async (pw) => {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
      return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
    };
    const isHashed = (s) => /^[0-9a-f]{64}$/i.test(s);

    const doChangePassword = async () => {
      setPwError(''); setPwOk(false);
      if (!pwForm.cur || !pwForm.next) { setPwError('الرجاء ملء جميع الحقول'); return; }
      if (pwForm.next.length < 6) { setPwError('كلمة المرور الجديدة يجب أن تكون 6 أحرف على الأقل'); return; }
      if (pwForm.next !== pwForm.confirm) { setPwError('كلمتا المرور غير متطابقتين'); return; }
      const users   = lsGet('tq_users', []);
      const stored  = users.find(u => u.id === currentUser.id);
      if (!stored) { setPwError('خطأ في البيانات'); return; }
      const hCur = await hashPwd(pwForm.cur);
      const valid = isHashed(stored.password) ? stored.password === hCur : stored.password === pwForm.cur;
      if (!valid) { setPwError('كلمة المرور الحالية غير صحيحة'); return; }
      const hNew = await hashPwd(pwForm.next);
      lsSet('tq_users', users.map(u => u.id === currentUser.id ? { ...u, password: hNew } : u));

  /* ── FlashDealsSection ───────────────────────────────────────────────── */
  function FlashDealCountdown({ endsAt }) {
    const [left, setLeft] = useState(0);
    useEffect(() => {
      const calc = () => setLeft(Math.max(0, Math.floor((new Date(endsAt) - Date.now()) / 1000)));
      calc();
      const id = setInterval(calc, 1000);
      return () => clearInterval(id);
    }, [endsAt]);
    if (left <= 0) return <span style={{ fontSize:11, color:'#e74c3c', fontWeight:700 }}>انتهى العرض</span>;
    const h = String(Math.floor(left / 3600)).padStart(2,'0');
    const m = String(Math.floor((left % 3600) / 60)).padStart(2,'0');
    const s = String(left % 60).padStart(2,'0');
    return (
      <div style={{ display:'flex', gap:3, alignItems:'center' }}>
        {[h, m, s].map((v, i) => (
          <React.Fragment key={i}>
            <span style={{ background:'#1a1a2e', color:'#fff', borderRadius:5, padding:'2px 5px', fontSize:12, fontWeight:900, fontVariantNumeric:'tabular-nums', minWidth:22, textAlign:'center' }}>{v}</span>
            {i < 2 && <span style={{ color:'#e74c3c', fontWeight:900, fontSize:13, lineHeight:1 }}>:</span>}
          </React.Fragment>
        ))}
      </div>
    );
  }

                  <HeartIcon size={14} color={favorites.has(p.id) ? '#e74c3c' : '#ccc'} filled={favorites.has(p.id)}/>

                <div style={{ padding:'10px 10px 12px' }}>

                      {p.discount > 0 && <span style={{ fontSize:11, color:'#bbb', textDecoration:'line-through', marginRight:5 }}>₪{p.price.toFixed(2)}</span>}
                    </div>
                    <button onClick={() => onAdd(p)} style={{ background:cart[p.id] ? '#27ae60' : 'linear-gradient(135deg,#e74c3c,#f39c12)', color:'#fff', border:'none', borderRadius:8, padding:'4px 10px', cursor:'pointer', fontFamily:'Tajawal,sans-serif', fontSize:12, fontWeight:700 }}>
                      {cart[p.id] ? `(${cart[p.id]})+` : 'أضف'}

          flex:1, display:'flex', flexDirection:'column', alignItems:'center',

          background:'transparent', pointerEvents:'none' }}/>
        <nav style={{
          position:'fixed', bottom:0, left:0, right:0, zIndex:800,

              position:'absolute', top:-22, left:'50%', transform:'translateX(-50%)',

            onTouchEnd={e=>{e.currentTarget.style.transform='translateX(-50%) scale(1)';}}>

  /* ── RecommendedSection ───────────────────────────────────────────────── */
  function RecommendedSection({ orders, products, cart, onAdd, onFav, favorites }) {
    const recommended = useMemo(() => {
      if (orders.length > 0) {
        const catCounts = {};
        orders.forEach(o => o.items.forEach(i => {
          const p = products.find(x=>x.id===i.id);
          if (p) catCounts[p.category] = (catCounts[p.category]||0) + i.qty;
        }));
        const topCat = Object.entries(catCounts).sort((a,b)=>b[1]-a[1])[0]?.[0];
        if (topCat) return products.filter(p=>p.category===topCat).slice(0,8);
      }
      return products.filter(p=>p.discount>0).sort((a,b)=>b.discount-a.discount).slice(0,8);
    }, [orders, products]);
    if (!recommended.length) return null;
    const isPersonal = orders.length > 0;
    return (
      <div style={{ marginBottom:28 }}>
        <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:14 }}>
          <div style={{ width:4, height:22, background:`linear-gradient(${TEAL},${GREEN})`, borderRadius:2 }}/>
          <h3 style={{ fontSize:17, fontWeight:900, color:DARK }}>{isPersonal?'مقترح لك':'الأكثر خصماً'}</h3>
          <UserIcon size={16} color={TEAL}/>
        </div>
        <div style={{ display:'flex', gap:14, overflowX:'auto', paddingBottom:6 }}>
          {recommended.map(p => {
            const fp = p.discount>0 ? p.price*(1-p.discount/100) : p.price;
            const CatIco = window.CAT_ICONS && window.CAT_ICONS[p.category];
            return (
              <div key={p.id} style={{ minWidth:148, background:'#fff', borderRadius:16, overflow:'hidden', boxShadow:'0 2px 12px rgba(0,0,0,0.07)', flexShrink:0, position:'relative' }}>
                {p.discount>0 && <div style={{ position:'absolute', top:7, left:7, background:'#e74c3c', color:'#fff', borderRadius:20, padding:'2px 8px', fontSize:11, fontWeight:800 }}>-{p.discount}%</div>}
                <button onClick={()=>onFav(p.id)} style={{ position:'absolute', top:7, right:7, background:'rgba(255,255,255,0.88)', border:'none', borderRadius:'50%', width:28, height:28, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>
                  <HeartIcon size={14} color={favorites.has(p.id)?'#e74c3c':'#ccc'} filled={favorites.has(p.id)}/>
                </button>
                <div style={{ height:88, background:CAT_BG[p.category]||'#f5f5f5', display:'flex', alignItems:'center', justifyContent:'center' }}>
                  {CatIco ? <CatIco size={44} color={CAT_IC[p.category]||'#bbb'}/> : <PackageIcon size={36} color="#ccc"/>}
                </div>
                <div style={{ padding:'10px 10px 11px' }}>
                  <div style={{ fontSize:13, fontWeight:700, color:DARK, lineHeight:1.25, marginBottom:6 }}>{p.name}</div>
                  <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
                    <span style={{ fontSize:14, fontWeight:900, color:GREEN }}>₪{fp.toFixed(2)}</span>
                    <button onClick={()=>onAdd(p)} style={{ background:cart[p.id]?'#27ae60':GREEN, color:'#fff', border:'none', borderRadius:8, padding:'4px 10px', cursor:'pointer', fontFamily:'Tajawal,sans-serif', fontSize:12, fontWeight:700 }}>
                      {cart[p.id]?`(${cart[p.id]})+`:'أضف'}
                    </button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  const DELIVERY_SLOTS = [
    { id:'asap',  label:'أسرع وقت ممكن', sub:'30 – 60 دقيقة', icon:'⚡' },
    { id:'noon',  label:'الظهيرة',         sub:'12:00 – 14:00',  icon:'☀️' },
    { id:'eve',   label:'المساء',           sub:'17:00 – 20:00',  icon:'🌆' },
    { id:'night', label:'الليل',            sub:'20:00 – 22:00',  icon:'🌙' },
  ];
  const PAYMENT_METHODS = [
    { id:'cash',   label:'نقداً عند التسليم', icon:'💵' },
    { id:'card',   label:'بطاقة ائتمان',      icon:'💳' },
    { id:'wallet', label:'محفظة إلكترونية',   icon:'📱' },
  ];
  const ORDER_STEPS  = ['استلام', 'تحضير', 'توصيل', 'تسليم'];
  const STEP_INDEX   = { pending:0, preparing:1, shipping:2, done:3 };

  /* ── CheckoutModal ────────────────────────────────────────────────────── */
  function CheckoutModal({ cart, products, appliedCoupon, userProfile, onConfirm, onClose }) {
    const [step,       setStep]       = useState(1);
    const [address,    setAddress]    = useState(userProfile?.address || '');
    const [phone,      setPhone]      = useState(userProfile?.phone   || '');
    const [notes,      setNotes]      = useState('');
    const [fieldError, setFieldError] = useState('');
    const [slot,    setSlot]    = useState('asap');
    const [payment, setPayment] = useState('cash');

    const items = Object.entries(cart).map(([id,qty])=>({ product:products.find(p=>p.id===Number(id)), qty })).filter(x=>x.product);
    const subtotal = items.reduce((s,{product,qty})=>{ const p=product.discount>0?product.price*(1-product.discount/100):product.price; return s+p*qty; }, 0);
    const couponD  = appliedCoupon ? (appliedCoupon.type==='percent' ? subtotal*appliedCoupon.value/100 : Math.min(appliedCoupon.value,subtotal)) : 0;
    const total    = Math.max(0, subtotal - couponD);
    const STEP_LABELS = ['التوصيل', 'الموعد', 'الدفع'];

    const inp = (val, set, ph, extra={}) => (
      <input value={val} onChange={e=>set(e.target.value)} placeholder={ph}
        style={{ width:'100%', padding:'11px 14px', border:'2px solid #eef0f2', borderRadius:11, fontFamily:'Tajawal,sans-serif', fontSize:14, outline:'none', transition:'border-color 0.2s', ...extra }}
        onFocus={e=>e.target.style.borderColor=GREEN} onBlur={e=>e.target.style.borderColor='#eef0f2'}/>
    );

    return (
      <div style={{ position:'fixed', inset:0, zIndex:3000, background:'rgba(0,0,0,0.65)', backdropFilter:'blur(5px)', display:'flex', alignItems:'center', justifyContent:'center', padding:16 }}
        onClick={e=>e.target===e.currentTarget&&onClose()}>
        <div style={{ background:'var(--surface)', borderRadius:22, width:460, maxWidth:'100%', maxHeight:'92vh', overflow:'hidden', display:'flex', flexDirection:'column', boxShadow:'0 24px 64px rgba(0,0,0,0.24)', animation:'aiSlideUp 0.28s ease' }}>

          <div style={{ background:`linear-gradient(135deg,${GREEN},${TEAL})`, padding:'18px 22px', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
            <div>
              <div style={{ color:'#fff', fontWeight:900, fontSize:17 }}>إتمام الطلب</div>
              <div style={{ color:'rgba(255,255,255,0.72)', fontSize:12, marginTop:2 }}>خطوة {step} من {STEP_LABELS.length}</div>
            </div>
            <button onClick={onClose} style={{ background:'rgba(255,255,255,0.18)', border:'none', borderRadius:'50%', width:34, height:34, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}><XIcon size={17} color="#fff"/></button>
          </div>

          <div style={{ padding:'16px 22px 4px', display:'flex', alignItems:'center' }}>
            {STEP_LABELS.map((s,i)=>(
              <React.Fragment key={i}>
                <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:3 }}>
                  <div style={{ width:28, height:28, borderRadius:'50%', background:i+1<=step?GREEN:'#e0e0e0', color:i+1<=step?'#fff':'#aaa', display:'flex', alignItems:'center', justifyContent:'center', fontWeight:900, fontSize:12, transition:'all 0.3s' }}>
                    {i+1<step ? <CheckIcon size={13} color="#fff"/> : <span style={{ fontSize:12 }}>{i+1}</span>}
                  </div>
                  <div style={{ fontSize:11, color:i+1<=step?GREEN:'#bbb', fontWeight:i+1===step?700:400 }}>{s}</div>
                </div>
                {i<STEP_LABELS.length-1 && <div style={{ flex:1, height:2, background:i+1<step?GREEN:'#e0e0e0', margin:'0 6px 16px', transition:'background 0.3s' }}/>}
              </React.Fragment>
            ))}
          </div>

          <div style={{ flex:1, overflowY:'auto', padding:'16px 22px' }}>
            {step===1 && (
              <div>
                <h3 style={{ fontSize:15, fontWeight:800, color:DARK, marginBottom:14 }}>📍 معلومات التوصيل</h3>
                <div style={{ marginBottom:12 }}>
                  <label style={{ fontSize:12, fontWeight:700, color:'#666', display:'block', marginBottom:5 }}>العنوان الكامل *</label>
                  {inp(address, setAddress, 'الحي، الشارع، رقم المنزل')}
                </div>
                <div style={{ marginBottom:12 }}>
                  <label style={{ fontSize:12, fontWeight:700, color:'#666', display:'block', marginBottom:5 }}>رقم الهاتف</label>
                  {inp(phone, setPhone, '05X-XXXXXXX', { direction:'ltr' })}
                </div>
                <div>
                  <label style={{ fontSize:12, fontWeight:700, color:'#666', display:'block', marginBottom:5 }}>ملاحظات (اختياري)</label>
                  <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="مثال: اتصل عند الوصول، الطابق الثاني..." rows={3}
                    style={{ width:'100%', padding:'11px 14px', border:'2px solid #eef0f2', borderRadius:11, fontFamily:'Tajawal,sans-serif', fontSize:14, outline:'none', resize:'none', transition:'border-color 0.2s' }}
                    onFocus={e=>e.target.style.borderColor=GREEN} onBlur={e=>e.target.style.borderColor='#eef0f2'}/>
                </div>
              </div>
            )}
            {step===2 && (
              <div>
                <h3 style={{ fontSize:15, fontWeight:800, color:DARK, marginBottom:14 }}>🕐 موعد التوصيل</h3>
                <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
                  {DELIVERY_SLOTS.map(s=>(
                    <button key={s.id} onClick={()=>setSlot(s.id)} style={{ display:'flex', alignItems:'center', gap:14, padding:'13px 16px', background:slot===s.id?GREEN+'14':'var(--surface2)', border:`2px solid ${slot===s.id?GREEN:'transparent'}`, borderRadius:14, cursor:'pointer', fontFamily:'Tajawal,sans-serif', textAlign:'right', transition:'all 0.15s' }}>
                      <span style={{ fontSize:22 }}>{s.icon}</span>
                      <div style={{ flex:1 }}>
                        <div style={{ fontWeight:700, fontSize:14, color:slot===s.id?GREEN:DARK }}>{s.label}</div>
                        <div style={{ fontSize:12, color:'#aaa', marginTop:2 }}>{s.sub}</div>
                      </div>
                      <div style={{ width:20, height:20, borderRadius:'50%', border:`2px solid ${slot===s.id?GREEN:'#ddd'}`, background:slot===s.id?GREEN:'transparent', display:'flex', alignItems:'center', justifyContent:'center', transition:'all 0.2s' }}>
                        {slot===s.id && <CheckIcon size={12} color="#fff"/>}
                      </div>
                    </button>
                  ))}
                </div>
              </div>
            )}
            {step===3 && (
              <div>
                <h3 style={{ fontSize:15, fontWeight:800, color:DARK, marginBottom:14 }}>💳 طريقة الدفع</h3>
                <div style={{ display:'flex', flexDirection:'column', gap:10, marginBottom:18 }}>
                  {PAYMENT_METHODS.map(m=>(
                    <button key={m.id} onClick={()=>setPayment(m.id)} style={{ display:'flex', alignItems:'center', gap:14, padding:'13px 16px', background:payment===m.id?GREEN+'14':'var(--surface2)', border:`2px solid ${payment===m.id?GREEN:'transparent'}`, borderRadius:14, cursor:'pointer', fontFamily:'Tajawal,sans-serif', textAlign:'right', transition:'all 0.15s' }}>
                      <span style={{ fontSize:22 }}>{m.icon}</span>
                      <div style={{ flex:1, fontWeight:700, fontSize:14, color:payment===m.id?GREEN:DARK }}>{m.label}</div>
                      <div style={{ width:20, height:20, borderRadius:'50%', border:`2px solid ${payment===m.id?GREEN:'#ddd'}`, background:payment===m.id?GREEN:'transparent', display:'flex', alignItems:'center', justifyContent:'center', transition:'all 0.2s' }}>
                        {payment===m.id && <CheckIcon size={12} color="#fff"/>}
                      </div>
                    </button>
                  ))}
                </div>
                <div style={{ background:'#f8fafb', borderRadius:14, padding:16 }}>
                  <div style={{ fontWeight:800, fontSize:14, color:DARK, marginBottom:12 }}>ملخص الطلب</div>
                  {items.map(({product,qty})=>{ const p=product.discount>0?product.price*(1-product.discount/100):product.price; return <div key={product.id} style={{ display:'flex', justifyContent:'space-between', fontSize:13, color:'#666', marginBottom:5 }}><span>{product.name} ×{qty}</span><span>{fmt(p*qty)}</span></div>; })}
                  <div style={{ borderTop:'1px solid #eee', marginTop:8, paddingTop:8 }}>
                    {couponD>0 && <div style={{ display:'flex', justifyContent:'space-between', fontSize:13, color:'#27ae60', marginBottom:4 }}><span>خصم الكوبون</span><span>-{fmt(couponD)}</span></div>}
                    <div style={{ display:'flex', justifyContent:'space-between', fontSize:16, fontWeight:900 }}><span style={{ color:DARK }}>الإجمالي</span><span style={{ color:GREEN }}>{fmt(total)}</span></div>
                  </div>
                </div>
              </div>
            )}
          </div>

          {fieldError && (
            <div style={{ margin:'0 22px 4px', padding:'9px 14px', background:'#fef2f2', border:'1px solid #fecaca', borderRadius:10, color:'#dc2626', fontSize:13, fontWeight:600 }}>
              ⚠️ {fieldError}
            </div>
          )}
          <div style={{ padding:'14px 22px 18px', borderTop:'1px solid var(--border)', display:'flex', gap:10 }}>
            {step>1 && <button onClick={()=>setStep(s=>s-1)} style={{ flex:1, padding:'12px', background:'var(--surface2)', border:'1px solid var(--border)', borderRadius:12, cursor:'pointer', fontFamily:'Tajawal,sans-serif', fontSize:14, fontWeight:700, color:'var(--text2)' }}>رجوع</button>}
            <button onClick={()=>{
              setFieldError('');
              if (step===1) {
                if (!address.trim() || address.trim().length < 8) { setFieldError('الرجاء إدخال عنوان كامل (8 أحرف على الأقل)'); return; }
                if (phone && !/^[\d+\-]{7,15}$/.test(phone.replace(/\s/g,''))) { setFieldError('رقم الهاتف غير صحيح'); return; }
              }
              if (step<3) { setStep(s=>s+1); return; }
              onConfirm({ address:address.trim(), phone:phone.trim(), notes:notes.trim(), slot, payment });
            }} style={{ flex:2, padding:'12px', background:`linear-gradient(135deg,${GREEN},#6fa832)`, color:'#fff', border:'none', borderRadius:12, cursor:'pointer', fontFamily:'Tajawal,sans-serif', fontSize:15, fontWeight:800, display:'flex', alignItems:'center', justifyContent:'center', gap:8, boxShadow:'0 4px 14px rgba(140,198,63,0.35)' }}>

  /* ── UndoSnack ────────────────────────────────────────────────────────── */
  function UndoSnack({ snack, onUndo, onDismiss }) {
    const [prog, setProg] = useState(100);
    useEffect(() => {
      const start = Date.now(), dur = 5000;
      const tick = setInterval(() => {
        const pct = 100 - ((Date.now()-start)/dur)*100;
        if (pct <= 0) { clearInterval(tick); onDismiss(); } else setProg(pct);
      }, 50);
      return () => clearInterval(tick);
    }, []);
    return (
      <div style={{ position:'fixed', bottom:100, left:'50%', transform:'translateX(-50%)', zIndex:2500, background:'#2d3436', color:'#fff', borderRadius:14, padding:'12px 18px', display:'flex', alignItems:'center', gap:12, boxShadow:'0 4px 20px rgba(0,0,0,0.28)', minWidth:270, fontFamily:'Tajawal,sans-serif', overflow:'hidden' }}>
        <div style={{ position:'absolute', bottom:0, right:0, height:3, background:GREEN, transition:'width 0.05s linear', width:`${prog}%` }}/>
        <span style={{ fontSize:14, flex:1 }}>تم حذف <b>{snack.name}</b> من السلة</span>
        <button onClick={onUndo} style={{ background:GREEN, color:'#fff', border:'none', borderRadius:8, padding:'5px 12px', cursor:'pointer', fontFamily:'Tajawal,sans-serif', fontSize:13, fontWeight:700, flexShrink:0 }}>تراجع</button>
      </div>
    );
  }

  /* ── LuckyWheelModal ────────────────────────────────────────────────── */
  function LuckyWheelModal({ onClose, onClaim }) {
    const PRIZES = [
      { label:'+5 نقاط',   pts:5,   color:'#8CC63F', emoji:'⭐' },
      { label:'+20 نقاط',  pts:20,  color:'#1F9FB3', emoji:'🎯' },
      { label:'+50 نقاط',  pts:50,  color:'#f39c12', emoji:'🌟' },
      { label:'+10 نقاط',  pts:10,  color:'#e91e63', emoji:'💫' },
      { label:'+100 نقاط', pts:100, color:'#9c27b0', emoji:'💎' },
      { label:'+5 نقاط',   pts:5,   color:'#00bcd4', emoji:'🎁' },
      { label:'حظ أوفر',   pts:0,   color:'#ff7043', emoji:'🍀' },
      { label:'+15 نقاط',  pts:15,  color:'#607d8b', emoji:'✨' },
    ];
    const N = PRIZES.length;
    const [spinning, setSpinning] = useState(false);
    const [rotation, setRotation] = useState(0);
    const [winner,   setWinner]   = useState(null);
    const [claimed,  setClaimed]  = useState(false);
    const rotRef = useRef(0);

    const polarXY = (cx,cy,r,deg) => {
      const rad = (deg - 90) * Math.PI / 180;
      return { x: cx + r*Math.cos(rad), y: cy + r*Math.sin(rad) };
    };
    const arc = (cx,cy,r,a1,a2) => {
      const s=polarXY(cx,cy,r,a1), e=polarXY(cx,cy,r,a2);
      return `M ${cx} ${cy} L ${s.x} ${s.y} A ${r} ${r} 0 ${a2-a1<=180?0:1} 1 ${e.x} ${e.y} Z`;
    };
    const segDeg = 360 / N;

    const spin = () => {
      if (spinning || winner) return;
      const idx = Math.floor(Math.random() * N);
      const target = 360 - (idx * segDeg + segDeg / 2);
      const newRot = rotRef.current + 5*360 + ((target - rotRef.current%360 + 360) % 360);
      rotRef.current = newRot;
      setSpinning(true);
      setRotation(newRot);
      setTimeout(() => { setSpinning(false); setWinner(PRIZES[idx]); }, 3600);
    };

    const claim = () => {
      setClaimed(true);
      onClaim(winner.pts);
      setTimeout(onClose, 900);
    };

    return (
      <div style={{ position:'fixed', inset:0, zIndex:4500, background:'rgba(0,0,0,0.72)', backdropFilter:'blur(6px)', display:'flex', alignItems:'center', justifyContent:'center', padding:16 }}>
        <div style={{ background:'var(--surface)', borderRadius:24, padding:'24px 22px 28px', maxWidth:360, width:'100%', textAlign:'center', boxShadow:'0 24px 64px rgba(0,0,0,0.28)', position:'relative', animation:'cardIn 0.3s ease' }}>
          <button onClick={onClose} style={{ position:'absolute', top:12, left:12, background:'var(--surface2)', border:'none', borderRadius:'50%', width:32, height:32, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>
            <XIcon size={16} color="#888"/>
          </button>
          <div style={{ fontSize:26, marginBottom:2 }}>🎰</div>
          <h3 style={{ margin:'0 0 2px', fontSize:18, fontWeight:900, color:'#2d3436' }}>عجلة الحظ</h3>
          <p style={{ margin:'0 0 18px', fontSize:13, color:'#888' }}>أدِر العجلة لربح نقاط مكافآت!</p>

          {/* pointer */}
          <div style={{ position:'relative', display:'inline-block', marginBottom:14 }}>
            <div style={{ position:'absolute', top:-14, left:'50%', transform:'translateX(-50%)', zIndex:3 }}>
              <div style={{ width:0, height:0, borderLeft:'13px solid transparent', borderRight:'13px solid transparent', borderTop:'24px solid #e74c3c', filter:'drop-shadow(0 3px 5px rgba(0,0,0,0.35))' }}/>
            </div>
            <svg width={300} height={300}
              style={{ display:'block', transition:spinning?'transform 3.6s cubic-bezier(0.17,0.67,0.12,0.99)':'none', transform:`rotate(${rotation}deg)` }}>
              {PRIZES.map((p,i) => {
                const a1=i*segDeg, a2=a1+segDeg, mid=a1+segDeg/2;
                const t=polarXY(150,150,98,mid);
                return (
                  <g key={i}>
                    <path d={arc(150,150,140,a1,a2)} fill={p.color} stroke="#fff" strokeWidth={2.5}/>
                    <text x={t.x} y={t.y} textAnchor="middle" dominantBaseline="middle"
                      fontSize={9} fontWeight={700} fill="#fff" fontFamily="Tajawal,sans-serif"
                      transform={`rotate(${mid},${t.x},${t.y})`} style={{ pointerEvents:'none' }}>
                      {p.emoji}
                    </text>
                  </g>
                );
              })}
              <circle cx={150} cy={150} r={20} fill="#fff" stroke="#ddd" strokeWidth={2}/>
              <circle cx={150} cy={150} r={9}  fill="#f39c12"/>
            </svg>
          </div>

          {/* prize legend strip */}
          <div style={{ display:'flex', flexWrap:'wrap', gap:4, justifyContent:'center', marginBottom:16 }}>
            {PRIZES.map((p,i) => (
              <span key={i} style={{ background:p.color+'22', color:p.color, borderRadius:20, padding:'2px 9px', fontSize:11, fontWeight:700, border:`1px solid ${p.color}44` }}>
                {p.emoji} {p.label}
              </span>
            ))}
          </div>

          {winner ? (
            <div>
              <div style={{ fontSize:42, marginBottom:6 }}>{winner.emoji}</div>
              <div style={{ fontSize:19, fontWeight:900, color:winner.pts>0?'#f39c12':'#888', marginBottom:14 }}>
                {winner.pts>0 ? `🎉 ربحت ${winner.label}!` : `${winner.emoji} ${winner.label}!`}
              </div>
              {!claimed ? (
                <button onClick={claim} style={{ background:'linear-gradient(135deg,#f39c12,#e67e22)', color:'#fff', border:'none', borderRadius:14, padding:'12px 0', fontFamily:'Tajawal,sans-serif', fontSize:15, fontWeight:800, cursor:'pointer', width:'100%' }}>
                  {winner.pts>0 ? `🎁 استلام ${winner.pts} نقطة` : '👍 حسناً'}
                </button>
              ) : (
                <div style={{ color:GREEN, fontWeight:800, fontSize:15 }}>✅ تم إضافة النقاط!</div>
              )}
            </div>
          ) : (
            <button onClick={spin} disabled={spinning} style={{ background:spinning?'#ccc':'linear-gradient(135deg,#8CC63F,#5e9627)', color:'#fff', border:'none', borderRadius:14, padding:'12px 0', fontFamily:'Tajawal,sans-serif', fontSize:15, fontWeight:800, cursor:spinning?'not-allowed':'pointer', width:'100%', display:'flex', alignItems:'center', justifyContent:'center', gap:8, transition:'background 0.2s' }}>
              {spinning ? '⏳ جاري الدوران...' : '🎰 أدِر العجلة'}
            </button>
          )}
        </div>
      </div>
    );
  }
